function sendMenuToEaters() {
  // Collect confirmed items from the edit fields
  var rows = document.querySelectorAll('.menu-item-row');
  var confirmedItems = [];
  rows.forEach(function(row, idx) {
    var nameEl = row.querySelector('.menu-item-name');
    var priceEl = row.querySelector('.menu-item-price');
    var name = nameEl ? nameEl.value.trim() : '';
    var price = priceEl ? parseFloat(priceEl.value) || 0 : 0;
    if (name) confirmedItems.push({ name: name, price: price, id: idx, claimedBy: null });
  });

  if (confirmedItems.length === 0) { alert('No items to send'); return; }

  var status = document.getElementById('send-menu-status');
  if (status) status.textContent = 'Sending...';

  db.collection('dinners').doc(sessionId).update({
    menuItems: confirmedItems,
    menuSentAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    menuItems = confirmedItems;
    if (status) status.innerHTML = '<span style="color:#5a7a5e;">✓ Menu sent! Eaters will see items to claim when they open their link.</span>';
  }).catch(function(e) {
    if (status) status.textContent = 'Error: ' + e.message;
  });
}

function applyItemAssignment() {
  var selects = document.querySelectorAll('.item-assign');
  var assignments = {};
  selects.forEach(function(sel) {
    var person = sel.value;
    if (!person) return;
    if (!assignments[person]) assignments[person] = [];
    assignments[person].push({ name: sel.dataset.name, price: parseFloat(sel.dataset.price) });
  });

  if (Object.keys(assignments).length === 0) {
    alert('Assign at least one item to someone first.');
    return;
  }

  var batch = db.batch();
  Object.keys(assignments).forEach(function(person) {
    var existingOrder = orders.find(function(o){ return o.name === person; });
    var existingItems = existingOrder ? existingOrder.items.slice() : [];
    var newItems = existingItems.concat(assignments[person]);
    var subtotal = newItems.reduce(function(s,i){ return s + i.price; }, 0);
    var docData = {
      name: person,
      items: newItems,
      subtotal: Math.round(subtotal * 100) / 100,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (existingOrder && existingOrder.isHost) docData.isHost = true;
    batch.set(db.collection('dinners').doc(sessionId).collection('orders').doc(person), docData);
  });

  batch.commit().then(function() {
    var el = document.getElementById('scan-items-result');
    if (el) el.innerHTML = '<div style="padding:12px;background:#eaf3de;border-radius:10px;font-size:14px;color:#3b6d11;font-weight:500;">✓ Items assigned and orders updated!</div>';
  }).catch(function(e) {
    alert('Error: ' + e.message);
  });
}

function calculate() {
  // Use receiptData from Tab 1
  var foodTotal = receiptData.subtotal || 0;
  var taxAmount = receiptData.tax || 0;
  if (!foodTotal) { alert('Confirm receipt totals in Tab 1 first.'); return; }
  var tipAmount, tipPct, tipLabel;
  if (tipAlreadyIncluded) {
    tipAmount = parseFloat(document.getElementById('tip-included-amt').value) || 0;
    tipPct = Math.round((tipAmount / foodTotal) * 100);
    tipLabel = 'Included (' + tipPct + '%)';
  } else {
    tipPct = parseFloat(document.getElementById('tip-pct').value) || 0;
    tipAmount = (foodTotal + taxAmount) * (tipPct / 100);
    tipLabel = tipPct + '%';
  }

  var allOrders = orders.slice();
  if (allOrders.length === 0) { alert('No orders yet. Make sure everyone has submitted and you have saved your own meal in Live Orders.'); return; }

  var ordersTotal = allOrders.reduce(function(s,o){ return s+(o.subtotal||0); },0);
  var gap = Math.round((foodTotal - ordersTotal) * 100) / 100;

  if (Math.abs(gap) > 0.05) {
    // Store state for after the user resolves the gap inline
    pendingCalcData = { foodTotal: foodTotal, taxAmount: taxAmount, tipAmount: tipAmount, tipPct: tipPct, tipLabel: tipLabel, allOrders: allOrders, ordersTotal: ordersTotal, gap: gap };
    document.getElementById('split-results').innerHTML =
      '<div class="card" style="border-left:4px solid #c8963e;margin-top:4px;">' +
        '<div class="card-title" style="color:#c8963e;">&#9888; Bill Mismatch</div>' +
        '<p style="font-size:14px;color:#6b5f4f;margin-bottom:6px;">Receipt total <strong>$' + foodTotal.toFixed(2) + '</strong> vs. sum of all orders <strong>$' + ordersTotal.toFixed(2) + '</strong>.</p>' +
        '<p style="font-size:13px;color:#8a7e6e;margin-bottom:16px;">Difference: <strong style="color:#c0522a;">$' + Math.abs(gap).toFixed(2) + '</strong> — how should we handle it?</p>' +
        '<div style="display:flex;gap:10px;">' +
          '<button class="btn-gold" style="flex:1;padding:12px;font-size:14px;" onclick="finishCalculate(false)">Split evenly across everyone</button>' +
          '<button class="btn-outline" style="flex:1;padding:12px;font-size:14px;" onclick="finishCalculate(true)">Host absorbs the difference</button>' +
        '</div>' +
      '</div>';
    return;
  }

  pendingCalcData = { foodTotal: foodTotal, taxAmount: taxAmount, tipAmount: tipAmount, tipPct: tipPct, tipLabel: tipLabel, allOrders: allOrders, ordersTotal: ordersTotal, gap: gap };
  finishCalculate(false);
}

function finishCalculate(hostAbsorbsGap) {
  if (!pendingCalcData) return;
  var d = pendingCalcData;
  pendingCalcData = null;
  var grandTotal = d.foodTotal + d.taxAmount + d.tipAmount;

  lastResults = d.allOrders.map(function(o){
    var sub = o.subtotal||0;
    var prop = d.ordersTotal>0 ? sub/d.ordersTotal : 1/d.allOrders.length;
    var adjustedSub = hostAbsorbsGap ? sub : sub + (prop * d.gap);
    var tax = prop * d.taxAmount;
    var tip = prop * d.tipAmount;
    var total = adjustedSub + tax + tip;
    return { name:o.name, subtotal:sub, adjustedSub:adjustedSub, tax:tax, tip:tip, total:total, tipPct:d.tipPct, isHost:o.isHost };
  });
  totalsSent = false;
  lastSplitInputs = { foodTotal: d.foodTotal, taxAmount: d.taxAmount, tipAmount: d.tipAmount, tipLabel: d.tipLabel, grandTotal: grandTotal };
  renderSplitResults();
}

function renderSplitResults() {
  if (!lastResults || !lastSplitInputs) return;
  var d = lastSplitInputs;
  var checkTotal = lastResults.reduce(function(s,r){ return s+r.total; },0);
  var balanced = Math.abs(checkTotal - d.grandTotal) < 0.10;
  var trs = lastResults.map(function(r){
    return '<tr><td style="font-weight:600">' + r.name + '</td>' +
      '<td style="color:#8a7e6e">$' + r.subtotal.toFixed(2) + '</td>' +
      '<td style="color:#8a7e6e">$' + r.tax.toFixed(2) + '</td>' +
      '<td style="color:#8a7e6e">$' + r.tip.toFixed(2) + '</td>' +
      '<td style="font-weight:700">$' + r.total.toFixed(2) + '</td></tr>';
  }).join('');
  var resultsEl = document.getElementById('split-results');
  if (!resultsEl) return;
  resultsEl.innerHTML =
    '<div class="card"><div class="card-title">The Reckoning</div>' +
    '<div style="margin-bottom:10px;font-size:12px;color:#8a7e6e;">Food $' + d.foodTotal.toFixed(2) + ' · Tax $' + d.taxAmount.toFixed(2) + ' · Tip ' + d.tipLabel + ' ($' + d.tipAmount.toFixed(2) + ')' + (tipAlreadyIncluded?' — already included':'') + '</div>' +
    '<div style="overflow-x:auto"><table>' +
    '<thead><tr><th>Name</th><th>Food</th><th>Tax</th><th>Tip</th><th>Total</th></tr></thead>' +
    '<tbody>' + trs +
    '<tr class="totals-row"><td>Total</td><td>$' + d.foodTotal.toFixed(2) + '</td><td>$' + d.taxAmount.toFixed(2) + '</td><td>$' + d.tipAmount.toFixed(2) + '</td><td>$' + d.grandTotal.toFixed(2) + '</td></tr>' +
    '</tbody></table></div>' +
    '<div style="margin-top:14px;padding:11px;background:#f7f5f0;border-radius:10px;display:flex;justify-content:space-between;align-items:center;">' +
    '<span style="font-size:12px;color:#8a7e6e;">Check total ties:</span>' +
    '<span style="font-size:13px;font-weight:700;color:' + (balanced?'#5a7a5e':'#c0522a') + '">' +
    (balanced ? '✓ Balanced' : '⚠ Off by $' + Math.abs(checkTotal - d.grandTotal).toFixed(2)) + '</span></div></div>' +
    (totalsSent
      ? '<div style="padding:14px;background:#eaf3de;border-radius:11px;font-size:14px;color:#3b6d11;font-weight:500;margin-bottom:8px;">✓ Totals already sent to eaters.</div>' +
        '<button class="btn-outline" onclick="recalculate()">Recalculate / Resend →</button>'
      : '<button class="btn-primary" id="notify-btn" onclick="notifyEaters()">Send Totals to Eaters →</button>');
}

function recalculate() {
  totalsSent = false;
  lastResults = null;
  lastSplitInputs = null;
  renderSplitTab();
}

function notifyEaters() {
  if (!lastResults || lastResults.length === 0) { alert('Calculate the split first.'); return; }
  var btn = document.getElementById('notify-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
  var batch = db.batch();
  lastResults.forEach(function(r) {
    var docName = r.name.replace(' (you)', '');
    var matchedOrder = orders.find(function(o){ return o.name === docName && o.isHost; });
    if (matchedOrder) return;
    batch.update(
      db.collection('dinners').doc(sessionId).collection('orders').doc(docName),
      {
        finalOwes: Math.round(r.total * 100) / 100,
        taxShare: Math.round(r.tax * 100) / 100,
        tipShare: Math.round(r.tip * 100) / 100,
        tipPct: r.tipPct || selectedTip
      }
    );
  });
  batch.commit().then(function() {
    totalsSent = true;
    renderSplitResults();
  }).catch(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Send Totals to Eaters →'; }
    alert('Error sending totals: ' + e.message);
  });
}
// ── WHO PAID TAB ─────────────────────────────────────────
function renderPaidTab() {
  var el = document.getElementById('tab-content');
  if (!el) return;
  var notified = orders.filter(function(o){ return o.finalOwes || o.isHost; });
  if (notified.length === 0) {
    el.innerHTML = '<div class="card"><div class="empty-state">Send totals to eaters first,<br>then track payments here.</div></div>';
    return;
  }
  var hostResult = lastResults ? lastResults.find(function(r){ return r.isHost; }) : null;
  var paidCount = notified.filter(function(o){ return o.isHost || paidStatus[o.name]; }).length;
  var totalOwed = notified.reduce(function(s,o){
    if (o.isHost) return s + (hostResult ? hostResult.total : 0);
    return s + (o.finalOwes||0);
  }, 0);
  var totalPaid = notified.reduce(function(s,o){
    if (o.isHost) return s + (hostResult ? hostResult.total : 0);
    return s + (paidStatus[o.name] ? (o.finalOwes||0) : 0);
  }, 0);

  var card = document.createElement('div');
  card.className = 'card';

  var header = document.createElement('div');
  header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;';
  header.innerHTML = '<div class="card-title" style="margin-bottom:0;">Payment Tracker</div>' +
    '<div style="font-size:13px;color:#5a7a5e;font-weight:600;">' + paidCount + ' / ' + notified.length + ' paid</div>';
  card.appendChild(header);

  notified.forEach(function(o) {
    var isPaid = paidStatus[o.name] || false;
    var row = document.createElement('div');
    row.className = 'pay-check-row';

    var info = document.createElement('div');
    var nameEl = document.createElement('div');
    nameEl.style.cssText = 'font-size:15px;font-weight:600;' + (isPaid ? 'text-decoration:line-through;color:#8a7e6e;' : '');
    nameEl.textContent = o.name;
    if (o.isHost) {
      var badge = document.createElement('span');
      badge.style.cssText = 'font-size:10px;background:#c8963e;color:#fff;padding:2px 6px;border-radius:10px;margin-left:4px;';
      badge.textContent = 'HOST';
      nameEl.appendChild(badge);
    }
    var sub = document.createElement('div');
    sub.style.cssText = 'font-size:13px;color:#8a7e6e;';
    sub.textContent = o.isHost ? 'Paid by card' : 'Owes $' + (o.finalOwes||0).toFixed(2);
    info.appendChild(nameEl);
    info.appendChild(sub);
    row.appendChild(info);

    if (o.isHost) {
      var covered = document.createElement('div');
      covered.style.cssText = 'text-align:right;';
      covered.innerHTML = '<div style="font-size:13px;font-weight:700;color:#1a1208;">$' + (hostResult ? hostResult.total.toFixed(2) : '—') + '</div><div style="font-size:11px;color:#5a7a5e;">Covered</div>';
      row.appendChild(covered);
    } else {
      var btn = document.createElement('button');
      btn.className = 'check-btn' + (isPaid ? ' paid' : '');
      btn.textContent = isPaid ? '✓' : '';
      btn.onclick = (function(name) { return function() { togglePaid(name); }; })(o.name);
      row.appendChild(btn);
    }
    card.appendChild(row);
  });

  var totals = document.createElement('div');
  totals.style.cssText = 'margin-top:14px;padding-top:14px;border-top:2px solid #e8e0d0;';
  totals.innerHTML =
    '<div style="display:flex;justify-content:space-between;font-size:13px;color:#8a7e6e;margin-bottom:6px;"><span>Total owed</span><span>$'+totalOwed.toFixed(2)+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:#5a7a5e;"><span>Total paid</span><span>$'+totalPaid.toFixed(2)+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;font-size:13px;color:#c0522a;margin-top:4px;"><span>Still owed</span><span>$'+(totalOwed-totalPaid).toFixed(2)+'</span></div>';
  card.appendChild(totals);

  el.innerHTML = '';
  el.appendChild(card);
}
function togglePaid(name) {
  paidStatus[name] = !paidStatus[name];
  renderPaidTab();
}

// ── EATER VIEW ───────────────────────────────────────────
function editOrder() {
  var name = localStorage.getItem('eater-name-' + sessionId);
  if (!name) { showEaterView(); return; }
  // Load existing order and pre-fill form
  db.collection('dinners').doc(sessionId).get().then(function(dDoc) {
    var dinner = dDoc.data();
    db.collection('dinners').doc(sessionId).collection('orders').doc(name).get().then(function(oDoc) {
      var existingItems = oDoc.exists ? oDoc.data().items : [];
      renderEaterForm(dinner, name, existingItems);
    });
  });
}

function showEaterView() {
  // Kill any host listeners
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  setRole('eater');
  db.collection('dinners').doc(sessionId).get().then(function(doc) {
    if (!doc.exists) {
      document.getElementById('app').innerHTML = '<div class="card"><p style="color:#c0522a;padding:20px;text-align:center;">Dinner not found. Ask the host for the correct link.</p></div>';
      return;
    }
    var dinner = doc.data();
    document.getElementById('header-sub').textContent = dinner.restaurant + ' · ' + formatDate(dinner.date);
    window._dinnerHostName = dinner.hostName || '';
    if (dinner.receiptData) receiptData = dinner.receiptData;
    if (dinner.menuItems) menuItems = dinner.menuItems;
    var savedName = localStorage.getItem('eater-name-' + sessionId);
    if (savedName) {
      checkEaterStatus(savedName, dinner);
    } else {
      renderEaterForm(dinner);
    }
  });
}

function renderEaterForm(dinner, prefillName, prefillItems) {
  var isEdit = prefillName && prefillItems && prefillItems.length > 0;
  var hasMenu = dinner.menuItems && dinner.menuItems.length > 0;

  var html = '';
  html += '<div class="card" style="border-left:4px solid #5a7a5e;">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">';
  html += '<div style="font-size:18px;font-weight:700;">' + dinner.restaurant + '</div>';
  html += '<div style="font-size:11px;font-weight:700;background:#5a7a5e;color:#fff;padding:5px 12px;border-radius:20px;">EATER</div>';
  html += '</div>';
  html += '<div style="font-size:13px;color:#8a7e6e;">' + formatDate(dinner.date) + ' · ' + (isEdit ? 'Update your order' : hasMenu ? 'Tap what you ordered' : 'Enter what you ordered') + '</div>';
  html += '</div>';
  html += '<div class="card">';
  html += '<div class="card-title">Your Name</div>';
  html += '<input type="text" id="guest-name" placeholder="First name + last initial (e.g. Sarah K)" value="' + (prefillName||'') + '" ' + (prefillName?'readonly style="background:#f0ebe0;color:#8a7e6e;"':'') + ' />';
  html += '<p style="font-size:11px;color:#8a7e6e;margin-top:4px;">Use first name + last initial to avoid duplicates</p>';
  html += '</div>';

  if (hasMenu) {
    // Show tap-to-claim menu
    html += '<div class="card">';
    html += '<div class="card-title">Tap Items You Ordered</div>';
    html += '<p style="font-size:12px;color:#8a7e6e;margin-bottom:12px;">Tap each item you ordered. Items already claimed by others are shown.</p>';
    html += '<div id="menu-claim-list">';
    dinner.menuItems.forEach(function(item, idx) {
      var claimed = item.claimedBy ? item.claimedBy : null;
      var isMe = prefillName && claimed === prefillName;
      var claimedText = claimed ? '<span style="font-size:11px;color:#8a7e6e;margin-left:6px;">← ' + claimed + '</span>' : '';
      html += '<div class="menu-claim-row" id="claim-'+idx+'" data-idx="'+idx+'" data-name="'+item.name.replace(/"/g,'&quot;')+'" data-price="'+item.price+'" onclick="toggleClaim(this)" style="display:flex;align-items:center;justify-content:space-between;padding:12px;margin-bottom:8px;border-radius:10px;border:1.5px solid '+(isMe?'#c8963e':'#e0d8c8')+';background:'+(isMe?'#fdf6eb':'#faf8f4')+';cursor:pointer;">';
      html += '<div style="display:flex;align-items:center;gap:10px;">';
      html += '<div style="width:22px;height:22px;border-radius:50%;border:2px solid '+(isMe?'#c8963e':'#e0d8c8')+';background:'+(isMe?'#c8963e':'#fff')+';display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;">'+(isMe?'✓':'')+'</div>';
      html += '<div><div style="font-size:14px;font-weight:500;">' + item.name + claimedText + '</div></div>';
      html += '</div>';
      html += '<div style="font-size:14px;font-weight:700;color:#c8963e;">$' + parseFloat(item.price).toFixed(2) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0ebe0;">';
    html += '<div style="font-size:13px;color:#8a7e6e;">Your total: <span id="claim-total" style="font-weight:700;color:#1a1208;">$0.00</span></div>';
    html += '</div>';
    html += '</div>';
  } else {
    // Manual entry fallback
    html += '<div class="card">';
    html += '<div class="card-title">Items You Ordered</div>';
    html += '<div id="items-list"></div>';
    html += '<button class="add-item-btn" onclick="addItem()">+ Add Item</button>';
    html += '</div>';
  }

  html += '<button class="btn-primary" id="submit-btn" onclick="submitOrder()">' + (isEdit ? 'Update My Order' : 'Submit My Order') + '</button>';
  html += '<p style="text-align:center;font-size:12px;color:#8a7e6e;margin-top:10px;">The host will calculate tax & tip and send you your total</p>';
  document.getElementById('app').innerHTML = html;

  if (hasMenu && prefillName) {
    // Pre-check items already claimed by this person
    updateClaimTotal();
  } else if (!hasMenu) {
    if (prefillItems && prefillItems.length > 0) {
      prefillItems.forEach(function(item) { addItem(item.name, item.price); });
    } else {
      addItem();
    }
  }
}

function toggleClaim(el) {
  var idx = parseInt(el.dataset.idx);
  var isSelected = el.style.background === 'rgb(253, 246, 235)' || el.style.background === '#fdf6eb';
  if (isSelected) {
    el.style.background = '#faf8f4';
    el.style.borderColor = '#e0d8c8';
    var circle = el.querySelector('div > div');
    if (circle) { circle.style.background = '#fff'; circle.style.borderColor = '#e0d8c8'; circle.textContent = ''; }
  } else {
    el.style.background = '#fdf6eb';
    el.style.borderColor = '#c8963e';
    var circle = el.querySelector('div > div');
    if (circle) { circle.style.background = '#c8963e'; circle.style.borderColor = '#c8963e'; circle.textContent = '✓'; }
  }
  updateClaimTotal();
}

function updateClaimTotal() {
  var total = 0;
  document.querySelectorAll('.menu-claim-row').forEach(function(el) {
    if (el.style.background === 'rgb(253, 246, 235)' || el.style.background === '#fdf6eb') {
      total += parseFloat(el.dataset.price) || 0;
    }
  });
  var el = document.getElementById('claim-total');
  if (el) el.textContent = '$' + total.toFixed(2);
}

function checkEaterStatus(name, dinner) {
  db.collection('dinners').doc(sessionId).collection('orders').doc(name).get().then(function(doc) {
    if (!doc.exists) {
      renderEaterWaiting(name, { items: [], subtotal: 0 }, dinner);
      return;
    }
    var data = doc.data();
    if (data.finalOwes) renderEaterOwes(name, data, dinner);
    else renderEaterWaiting(name, data, dinner);
  });
}

function renderEaterWaiting(name, data, dinner) {
  var html = '';
  html += '<div class="card" style="text-align:center;padding:32px 24px;">';
  html += '<div style="font-size:40px;margin-bottom:12px;">⏳</div>';
  html += '<div style="font-size:20px;font-weight:700;margin-bottom:8px;">Order received, ' + name + '!</div>';
  html += '<p style="color:#8a7e6e;font-size:14px;margin-bottom:20px;">The host is calculating the split.<br>Your total will appear here automatically.</p>';
  html += '<div style="padding:14px;background:#f7f5f0;border-radius:10px;margin-bottom:16px;">';
  data.items.forEach(function(i) {
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#6b5f4f;"><span>'+i.name+'</span><span>$'+parseFloat(i.price).toFixed(2)+'</span></div>';
  });
  html += '<div style="border-top:1px solid #e0d8c8;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:14px;font-weight:600;"><span>Your food subtotal</span><span>$'+parseFloat(data.subtotal).toFixed(2)+'</span></div>';
  html += '</div>';
  html += '<p style="font-size:12px;color:#c8963e;margin-bottom:12px;">Checking for your total...</p>';
  html += '<button class="btn-outline" onclick="editOrder()" style="margin-top:4px;">Edit My Order</button>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;

  // Listen in real-time for finalOwes
  var unsub = db.collection('dinners').doc(sessionId).collection('orders').doc(name)
    .onSnapshot(function(doc) {
      if (doc.exists && doc.data().finalOwes) {
        unsub();
        db.collection('dinners').doc(sessionId).get().then(function(dDoc) {
          renderEaterOwes(name, doc.data(), dDoc.data());
        });
      }
    });
}

function renderEaterOwes(name, data, dinner) {
  document.getElementById('app').innerHTML =
    '<div class="card" style="text-align:center;padding:32px 24px;">' +
      '<div style="font-size:13px;color:#8a7e6e;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;">Your total for ' + dinner.restaurant + '</div>' +
      '<div class="big-amount">$' + data.finalOwes.toFixed(2) + '</div>' +
      '<p style="color:#8a7e6e;font-size:14px;margin-bottom:20px;">Includes your share of tax & tip</p>' +
      '<div style="padding:14px;background:#f7f5f0;border-radius:10px;margin-bottom:16px;">' +
        data.items.map(function(i){
          return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#6b5f4f;"><span>'+i.name+'</span><span>$'+parseFloat(i.price).toFixed(2)+'</span></div>';
        }).join('') +
        '<div style="border-top:1px solid #e0d8c8;margin-top:8px;padding-top:8px;">' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;color:#8a7e6e;padding:2px 0;"><span>Food subtotal</span><span>$'+parseFloat(data.subtotal).toFixed(2)+'</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;color:#8a7e6e;padding:2px 0;"><span>Your share of tax</span><span>$'+parseFloat(data.taxShare||0).toFixed(2)+'</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;color:#8a7e6e;padding:2px 0;"><span>Your share of tip ('+(data.tipPct||0)+'%)</span><span>$'+parseFloat(data.tipShare||0).toFixed(2)+'</span></div>' +
        '</div>' +
      '</div>' +
      '<div style="background:#1a1208;color:#f7f5f0;border-radius:11px;padding:16px;font-size:16px;font-weight:700;">' +
        (dinner.payMethod||'Zelle') + (dinner.payHandle?' @'+dinner.payHandle:'') + ' → $' + data.finalOwes.toFixed(2) +
      '</div>' +
    '</div>';
}

function addItem(name, price) {
  itemCount++;
  var list = document.getElementById('items-list');
  var div = document.createElement('div');
  div.className = 'item-row';
  div.id = 'item-' + itemCount;
  div.innerHTML =
    '<input type="text" placeholder="Item name" class="item-name" value="' + (name||'') + '" />' +
    '<input type="number" placeholder="$0.00" step="0.01" min="0" class="item-price" value="' + (price||'') + '" />' +
    '<button class="remove-btn" onclick="removeItem(this)">×</button>';
  list.appendChild(div);
}

function removeItem(btn) {
  var row = btn.parentElement;
  if (document.querySelectorAll('#items-list .item-row').length > 1) row.remove();
}

function submitOrder() {
  var name = document.getElementById('guest-name').value.trim();
  if (!name) { alert('Please enter your name'); return; }

  var items = []; var subtotal = 0;

  // Check if we're in menu claim mode
  var claimRows = document.querySelectorAll('.menu-claim-row');
  if (claimRows.length > 0) {
    claimRows.forEach(function(el) {
      if (el.style.background === 'rgb(253, 246, 235)' || el.style.background === '#fdf6eb') {
        var itemName = el.dataset.name;
        var price = parseFloat(el.dataset.price) || 0;
        items.push({ name: itemName, price: price });
        subtotal += price;
      }
    });
    if (items.length === 0) { alert('Tap at least one item you ordered'); return; }

    // Update claimedBy on each item in Firestore
    db.collection('dinners').doc(sessionId).get().then(function(doc) {
      if (!doc.exists) return;
      var dinner = doc.data();
      var updatedMenu = (dinner.menuItems || []).map(function(item, idx) {
        var claimEl = document.getElementById('claim-' + idx);
        if (claimEl && (claimEl.style.background === 'rgb(253, 246, 235)' || claimEl.style.background === '#fdf6eb')) {
          return Object.assign({}, item, { claimedBy: name });
        }
        return item;
      });
      return db.collection('dinners').doc(sessionId).update({ menuItems: updatedMenu });
    });
  } else {
    // Manual entry mode
    var rows = document.querySelectorAll('.item-row');
    rows.forEach(function(row) {
      var n = row.querySelector('.item-name').value.trim();
      var p = parseFloat(row.querySelector('.item-price').value) || 0;
      if (n || p) { items.push({ name: n||'Item', price: p }); subtotal += p; }
    });
    if (items.length === 0) { alert('Add at least one item'); return; }
  }
  var btn = document.getElementById('submit-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Submitting...'; }
  db.collection('dinners').doc(sessionId).collection('orders').doc(name).set({
    name: name, items: items,
    subtotal: Math.round(subtotal*100)/100,
    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    localStorage.setItem('eater-name-' + sessionId, name);
    localStorage.setItem('last-eater-session', sessionId);
    // Get dinner data and show waiting screen directly - no re-routing
    db.collection('dinners').doc(sessionId).get().then(function(doc) {
      var dinner = doc.exists ? doc.data() : { restaurant: '', date: '' };
      renderEaterWaiting(name, { items: items, subtotal: subtotal }, dinner);
    });
  }).catch(function(e) {
    alert('Error: ' + e.message);
    if(btn){ btn.disabled = false; btn.textContent = 'Submit My Order'; }
  });
}

function setRole(role) {
  var pill = document.getElementById('role-pill');
  pill.style.display = 'block';
  pill.className = 'role-pill role-' + role;
  pill.textContent = role === 'host' ? 'HOST' : 'EATER';
}

function formatDate(d) {
  if (!d) return '';
  var parts = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}
