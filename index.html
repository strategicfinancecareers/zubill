<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFF4E8">
<title>Zubill — Open a tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Outfit:wght@300;400;500;600;700;800&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFF4E8;
  color: #2A1610;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
button { font: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
input:focus, select:focus, textarea:focus { outline: none; }
.tab-tnum { font-variant-numeric: tabular-nums; }
.tab-app { max-width: 520px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 140px; }
.tab-input {
  width: 100%; padding: 13px 15px;
  background: #FFF8EE; color: #2A1610;
  border: 1.5px solid rgba(42,22,16,0.12);
  border-radius: 14px; font-size: 15px; font-weight: 500;
  font-family: 'Outfit', system-ui, sans-serif;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.tab-input:focus { border-color: #E54B3C; background: #fff; }
.tab-input[readonly] { background: #FFEAD2; color: #6B4F40; }
.tab-input::placeholder { color: #A08573; }
.tab-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: #6B4F40; margin-bottom: 6px;
}
.tab-card {
  background: #fff; border-radius: 22px; padding: 18px;
  box-shadow: 0 1px 0 rgba(42,22,16,0.05), 0 12px 24px -20px rgba(42,22,16,0.15);
}
.tab-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; padding: 4px 9px; border-radius: 999px;
}
.tab-iconbtn {
  width: 38px; height: 38px; border-radius: 999px;
  border: 1.5px solid rgba(42,22,16,0.10);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  color: #2A1610; flex-shrink: 0;
}
.tab-iconbtn:active { transform: scale(0.96); }
.tab-fab {
  background: #2A1610; color: #FFF4E8;
  border: none; border-radius: 999px;
  padding: 15px 26px; font-size: 15px; font-weight: 600;
  letter-spacing: -0.1px;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 20px 40px -12px rgba(42,22,16,0.45), 0 0 0 6px rgba(255,244,232,0.7);
}
.tab-fab:active { transform: translateY(1px); }
.tab-grad-btn {
  background: linear-gradient(135deg, #FF8B6D, #E54B3C);
  color: #fff; border: none; border-radius: 999px;
  padding: 14px 22px; font-size: 14.5px; font-weight: 700;
  letter-spacing: -0.1px;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 20px -6px rgba(229,75,60,0.55);
}
.tab-grad-btn:disabled { background: rgba(42,22,16,0.18); color: rgba(255,244,232,0.55); box-shadow: none; }
.tab-outline-btn {
  background: transparent; color: #2A1610;
  border: 1.5px solid rgba(42,22,16,0.18);
  border-radius: 999px; padding: 12px 18px; font-size: 14px; font-weight: 600;
}
.tab-ghost-btn {
  background: transparent; border: none; color: #E54B3C;
  font-size: 13px; font-weight: 600; padding: 6px 10px;
}
.tab-item-row {
  background: #fff; border-radius: 20px; padding: 12px 14px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 1px 0 rgba(42,22,16,0.05);
  cursor: pointer;
  transition: box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
}
.tab-item-row.is-mine {
  background: #FFF8F0;
  box-shadow: inset 0 0 0 2px #E54B3C, 0 10px 24px -16px rgba(229,75,60,0.4);
  transform: translateY(-1px);
}
.tab-item-row.is-locked { cursor: default; }
.tab-emoji-chip {
  width: 48px; height: 48px; border-radius: 14px;
  background: #FFE7D1;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
  transition: background 0.25s ease;
}
.tab-item-row.is-mine .tab-emoji-chip {
  background: linear-gradient(135deg, #FFD6B0, #FF8B6D);
}
.tab-sticky-bar {
  position: fixed; bottom: 22px; left: 16px; right: 16px;
  max-width: 488px; margin: 0 auto;
  background: #2A1610; color: #FFF4E8;
  border-radius: 22px; padding: 14px 18px;
  box-shadow: 0 22px 48px -16px rgba(42,22,16,0.55), 0 0 0 6px rgba(255,244,232,0.8);
  z-index: 20;
}
.tab-stage-enter { animation: stageSwap 280ms cubic-bezier(0.2, 0.7, 0.2, 1) both; }
.tab-fade-in { animation: tabFadeIn 220ms ease-out both; }
@keyframes stageSwap { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes tabFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes tabPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
@keyframes tickerSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes tabSpin { to { transform: rotate(360deg); } }
@keyframes tabBob { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-6px) rotate(6deg); } }
@keyframes confettiFall {
  0% { opacity: 0; transform: translate3d(0,-20px,0) rotate(0); }
  12% { opacity: 1; }
  100% { opacity: 0; transform: translate3d(var(--drift), 720px, 0) rotate(720deg); }
}
@keyframes spin { to { transform: rotate(360deg); } }
.tab-toast {
  position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
  background: #2A1610; color: #FFF4E8; padding: 10px 16px;
  border-radius: 999px; font-size: 13px; font-weight: 600;
  box-shadow: 0 20px 40px -12px rgba(42,22,16,0.45);
  z-index: 60; animation: tabFadeIn 180ms ease-out;
}
</style>
</head>

<script type="module">

// ── Tiny utilities ───────────────────────────────────────────────────────
function round2(n) { return Math.round(n * 100) / 100; }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]
  ));
}
function attr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
function userDisplay(u) {
  if (!u) return '';
  var meta = u.user_metadata || {};
  return meta.full_name || meta.name || u.email || '';
}
function userFirstName(u) {
  var n = userDisplay(u);
  if (!n) return 'there';
  return n.split(/[\s@]/)[0] || 'there';
}
function formatDate(d) {
  if (!d) return '';
  var parts = String(d).split('-');
  if (parts.length < 3) return d;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]);
}
function dayOfWeek(d) {
  if (!d) return 'Tonight';
  try {
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    return days[new Date(d + 'T12:00:00').getDay()] || 'Tonight';
  } catch (e) { return 'Tonight'; }
}
function whenLabel(createdAt, date) {
  if (createdAt) {
    var diff = Date.now() - new Date(createdAt).getTime();
    if (diff < 12 * 3600 * 1000) return 'Tonight';
    if (diff < 36 * 3600 * 1000) return 'Yesterday';
  }
  return formatDate(date);
}
function normalizeDinner(d) {
  if (!d) return null;
  return {
    id: d.id,
    restaurant: d.restaurant,
    name: d.name,
    date: d.date,
    hostName: d.host_name,
    payMethod: d.pay_method,
    payHandle: d.pay_handle,
    menuItems: d.menu_items || [],
    receiptData: d.receipt_data || { subtotal: 0, tax: 0, tip: 0, fees: [], confirmed: false },
    orderCount: d.order_count || 0,
    createdAt: d.created_at,
  };
}
function normalizeOrder(o) {
  return {
    name: o.eater_name,
    items: (o.order_items || []).map(i => ({ name: i.name, price: parseFloat(i.price) })),
    subtotal: parseFloat(o.subtotal) || 0,
    isHost: !!o.is_host,
    finalOwes: o.final_owes != null ? parseFloat(o.final_owes) : undefined,
    taxShare: o.tax_share != null ? parseFloat(o.tax_share) : undefined,
    tipShare: o.tip_share != null ? parseFloat(o.tip_share) : undefined,
    tipPct: o.tip_pct != null ? parseFloat(o.tip_pct) : undefined,
    submittedAt: o.submitted_at,
  };
}
async function fetchDinnerRaw(id) {
  var res = await supabase.from('dinners').select('*').eq('id', id).maybeSingle();
  if (res.error) { console.error(res.error); return null; }
  return res.data;
}
async function fetchOrdersForDinner(id) {
  try {
    var res = await supabase
      .from('orders')
      .select('id, eater_name, subtotal, is_host, submitted_at, final_owes, tax_share, tip_share, tip_pct, order_items(name, price)')
      .eq('dinner_id', id)
      .order('submitted_at', { ascending: true });
    if (res.error) { console.warn('fetchOrders error:', res.error); return []; }
    return (res.data || []).map(normalizeOrder);
  } catch (e) {
    console.warn('fetchOrders threw:', e);
    return [];
  }
}
async function fetchParticipants(id) {
  try {
    var res = await supabase
      .from('participants')
      .select('id, name, joined_at, has_picked, picked_at')
      .eq('dinner_id', id)
      .order('joined_at', { ascending: true });
    if (res.error) { console.warn('fetchParticipants error:', res.error); return []; }
    return res.data || [];
  } catch (e) {
    console.warn('fetchParticipants threw:', e);
    return [];
  }
}
async function removeChannelSafe(ch) {
  if (!ch) return;
  try { await supabase.removeChannel(ch); } catch (e) {}
}

// ── Design helpers ───────────────────────────────────────────────────────
function emojiForItem(name) {
  if (!name) return '🍽️';
  var n = String(name).toLowerCase();
  var rules = [
    [/limone|lemon/, '🍋'],
    [/oyster|vongole|clam|mussel|shellfish/, '🦪'],
    [/wagyu|steak|ribeye|filet|beef|tenderloin|short rib|brisket/, '🥩'],
    [/meatball/, '🍖'],
    [/tagliolini|rigatoni|linguine|spaghetti|carbonara|cacio|bolognese|alfredo|fettuccine|lasagna|pasta|gnocchi|ravioli/, '🍝'],
    [/martini|cocktail|negroni|aperol|spritz|manhattan|margarita|old fashioned|highball/, '🍸'],
    [/wine|tignanello|chardonnay|cabernet|merlot|pinot|sauvignon|rose|rosé|champagne|prosecco|barolo|chianti|bottle/, '🍷'],
    [/beer|ipa|lager|pilsner|stout/, '🍺'],
    [/tiramisu|cake|gelato|dessert|cannoli|crème|cheesecake|brulee|brûlée|sundae|cookie|brownie|panna cotta|sorbet/, '🍰'],
    [/coffee|espresso|cappuccino|latte|americano|macchiato/, '☕'],
    [/pizza|margherita|pepperoni|calzone/, '🍕'],
    [/burger|cheeseburger|smashburger/, '🍔'],
    [/fries|frites/, '🍟'],
    [/chicken|cutlet|piccata|milanese|parm/, '🍗'],
    [/salmon|tuna|branzino|sea bass|bass|cod|halibut|swordfish|fish/, '🐟'],
    [/salad|caesar|caprese|arugula|burrata|insalata/, '🥗'],
    [/soup|brodo|minestrone|bisque|stracciatella/, '🍲'],
    [/bread|focaccia|baguette/, '🥖'],
    [/taco|burrito|quesadilla/, '🌮'],
    [/sushi|sashimi|nigiri|maki|roll/, '🍣'],
    [/ramen|noodle|pho|udon/, '🍜'],
    [/egg|omelet|frittata/, '🍳'],
    [/shrimp|scampi|prawn|lobster/, '🍤'],
    [/duck|foie/, '🦆'],
    [/pork|prosciutto|guanciale|bacon/, '🥓'],
    [/risotto/, '🍚'],
    [/cheese|formaggio/, '🧀'],
  ];
  for (var i = 0; i < rules.length; i++) {
    if (rules[i][0].test(n)) return rules[i][1];
  }
  return '🍽️';
}
function avatarFor(name) {
  var palette = ['#B85656','#2E7D5B','#3F3A4F','#C9A86A','#7B7B6F','#9A6E54','#5C6F4B','#1F1A16'];
  var s = String(name || '').trim();
  var initial = (s[0] || '?').toUpperCase();
  var h = 0;
  for (var i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) | 0;
  return { initial: initial, tone: palette[Math.abs(h) % palette.length] };
}
function vibeForDinner(d) {
  var name = String((d && (d.name || d.restaurant)) || '').toLowerCase();
  if (name.indexOf('birthday') >= 0)       return { tag: '🎂 Birthday dinner', vibe: 'gold' };
  if (name.indexOf('girls') >= 0)          return { tag: '🍸 Girls Night',     vibe: 'cherry' };
  if (name.indexOf('boys') >= 0)           return { tag: '🥩 Boys dinner',     vibe: 'olive' };
  if (name.indexOf('anniversary') >= 0)    return { tag: '🥂 Anniversary',     vibe: 'cherry' };
  if (name.indexOf('pizza') >= 0)          return { tag: '🍕 Pizza Friday',    vibe: 'coral' };
  var day = dayOfWeek(d && d.date);
  var s = (d && (d.id || d.restaurant)) || '';
  var h = 0;
  for (var i = 0; i < String(s).length; i++) h = ((h * 31) + String(s).charCodeAt(i)) | 0;
  var vibes = ['tomato','coral','gold','olive','cherry'];
  return { tag: '🍝 ' + day + ' supper', vibe: vibes[Math.abs(h) % vibes.length] };
}
function avatarHTML(name, opts) {
  opts = opts || {};
  var size = opts.size || 28;
  var p = avatarFor(name);
  var ring = opts.ring;
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:999px;background:'+p.tone+
    ';color:#fff;display:flex;align-items:center;justify-content:center;font-family:'+T.sans+
    ';font-weight:600;font-size:'+(size*0.42).toFixed(1)+'px;letter-spacing:0.2px;flex-shrink:0;'+
    (ring ? 'box-shadow:0 0 0 2px '+ring+';' : '') + '">'+escapeHtml(p.initial)+'</div>';
}
function avatarStackHTML(names, opts) {
  opts = opts || {};
  var size = opts.size || 26;
  var max  = opts.max  || 4;
  var ring = opts.ring || T.cream;
  var shown = names.slice(0, max);
  var rest  = Math.max(0, names.length - shown.length);
  var html  = '<div style="display:inline-flex;align-items:center;">';
  for (var i = 0; i < shown.length; i++) {
    var margin = i === 0 ? 0 : -size*0.32;
    html += '<div style="margin-left:'+margin+'px;">' + avatarHTML(shown[i], { size: size, ring: ring }) + '</div>';
  }
  if (rest > 0) {
    html += '<div style="margin-left:'+(-size*0.32).toFixed(1)+'px;width:'+size+'px;height:'+size+
      'px;border-radius:999px;background:'+T.cream+';color:'+T.ink+
      ';display:flex;align-items:center;justify-content:center;font-family:'+T.sans+
      ';font-size:'+(size*0.38).toFixed(1)+'px;font-weight:600;box-shadow:0 0 0 2px '+T.cream+
      ', inset 0 0 0 1.5px '+T.ink+';">+'+rest+'</div>';
  }
  html += '</div>';
  return html;
}
function avatarHTMLWithCheck(name, opts) {
  opts = opts || {};
  var size = opts.size || 28;
  var picked = !!opts.picked;
  var ring = opts.ring || T.cream;
  var p = avatarFor(name);
  var dim = picked ? '' : 'opacity:0.55;';
  var html = '<div style="position:relative;display:inline-block;width:'+size+'px;height:'+size+'px;flex-shrink:0;">' +
    '<div style="width:'+size+'px;height:'+size+'px;border-radius:999px;background:'+p.tone+';color:#fff;display:flex;align-items:center;justify-content:center;font-family:'+T.sans+';font-weight:600;font-size:'+(size*0.42).toFixed(1)+'px;letter-spacing:0.2px;'+dim+(ring?'box-shadow:0 0 0 2px '+ring+';':'')+'">'+escapeHtml(p.initial)+'</div>';
  if (picked) {
    var bs = Math.max(11, Math.round(size * 0.46));
    html += '<div style="position:absolute;bottom:-2px;right:-2px;width:'+bs+'px;height:'+bs+'px;border-radius:999px;background:'+T.olive+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:'+Math.max(8, Math.round(bs*0.58))+'px;font-weight:800;box-shadow:0 0 0 2px '+ring+';line-height:1;">✓</div>';
  }
  html += '</div>';
  return html;
}
function participantsStackHTML(parts, opts) {
  opts = opts || {};
  var size = opts.size || 26;
  var max  = opts.max  || 4;
  var ring = opts.ring || T.cream;
  // Picked first, then joined-only
  var sorted = parts.slice().sort(function(a, b) {
    return (b.has_picked ? 1 : 0) - (a.has_picked ? 1 : 0);
  });
  var shown = sorted.slice(0, max);
  var rest = Math.max(0, sorted.length - shown.length);
  var html = '<div style="display:inline-flex;align-items:center;">';
  for (var i = 0; i < shown.length; i++) {
    var margin = i === 0 ? 0 : -size*0.32;
    html += '<div style="margin-left:'+margin+'px;">' +
      avatarHTMLWithCheck(shown[i].name, { size: size, picked: !!shown[i].has_picked, ring: ring }) +
    '</div>';
  }
  if (rest > 0) {
    html += '<div style="margin-left:'+(-size*0.32).toFixed(1)+'px;width:'+size+'px;height:'+size+
      'px;border-radius:999px;background:'+T.cream+';color:'+T.ink+
      ';display:flex;align-items:center;justify-content:center;font-family:'+T.sans+
      ';font-size:'+(size*0.38).toFixed(1)+'px;font-weight:600;box-shadow:0 0 0 2px '+ring+
      ', inset 0 0 0 1.5px '+T.ink+';">+'+rest+'</div>';
  }
  html += '</div>';
  return html;
}
function moneyHTML(amount, opts) {
  opts = opts || {};
  var big = !!opts.big;
  var color = opts.color || 'inherit';
  var n = Number(amount || 0).toFixed(2);
  var parts = n.split('.');
  var dsSize = big ? '22px' : '0.7em';
  var dsTop  = big ? 'top:6px;' : '';
  var decSize = big ? '24px' : '0.75em';
  var fs = big ? '44px' : 'inherit';
  var ls = big ? '-1px' : '-0.2px';

// ── Live activity ticker ─────────────────────────────────────────────────
function tickerLines() {
  var lines = [];
  orders.forEach(function(o) {
    (o.items || []).forEach(function(it) {
      var verbs = ['grabbed', 'claimed', 'snagged', 'is on'];
      var s = (o.name || '') + (it.name || '');
      var h = 0;
      for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
      var verb = verbs[Math.abs(h) % verbs.length];
      var connective = verb === 'is on' ? ' the ' : ' the ';
      lines.push({
        who: o.name,
        emoji: emojiForItem(it.name),
        text: verb + connective + it.name.toLowerCase(),
      });
    });
  });
  return lines;
}
function tickerHTML() {
  var joinedCount = participants.length;
  var pickedCount = participants.filter(function(p){ return p.has_picked; }).length;
  if (joinedCount === 0) {
    return '<div style="background:'+T.paper+';border-radius:18px;padding:14px 16px;border:1px solid '+T.rule+
      ';display:flex;align-items:center;gap:12px;color:'+T.inkSoft+';font-size:13.5px;font-weight:500;">' +
      '<span style="font-size:20px;">👥</span>' +
      '<span>Nobody’s joined yet — share the link 📎</span>' +
    '</div>';
  }
  var lines = tickerLines();
  var hasTicker = lines.length > 0;
  return '<div id="tab-ticker" style="background:'+T.paper+';border-radius:18px;padding:12px 14px;border:1px solid '+T.rule+';">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
      participantsStackHTML(participants, { size: 24, max: 5, ring: T.paper }) +
      '<div style="font-size:13.5px;font-weight:600;color:'+T.ink+';flex:1;min-width:0;line-height:1.25;">' +
        '<span style="color:'+T.ink+';">'+joinedCount+'</span>' +
        '<span style="color:'+T.inkSoft+';font-weight:500;"> joined · </span>' +
        '<span style="color:'+T.olive+';">'+pickedCount+'</span>' +
        '<span style="color:'+T.inkSoft+';font-weight:500;"> picked</span>' +
      '</div>' +
      '<span style="width:7px;height:7px;border-radius:999px;background:'+T.tomato+
      ';box-shadow:0 0 0 3px rgba(229,75,60,0.18);animation:tabPulse 1.6s ease-in-out infinite;flex-shrink:0;" aria-label="Live"></span>' +
    '</div>' +
    (hasTicker
      ? '<div style="height:1px;background:'+T.rule+';margin:10px 0 8px;"></div>' +
        '<div id="tab-ticker-content" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:'+T.inkSoft+';overflow:hidden;min-height:22px;"></div>'
      : '') +
  '</div>';
}
function stopTicker() {
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
}
function startTicker() {
  stopTicker();
  var lines = tickerLines();
  if (lines.length === 0) return;
  var idx = 0;
  var paint = function() {
    var content = document.getElementById('tab-ticker-content');
    if (!content) { stopTicker(); return; }
    var item = lines[idx % lines.length];
    content.innerHTML = '<div style="display:flex;align-items:center;gap:7px;animation:tickerSlide 0.45s ease-out;min-width:0;">' +
      avatarHTML(item.who, { size: 18 }) +
      '<div style="font-size:12.5px;font-weight:500;color:'+T.inkSoft+';line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
        '<strong style="font-weight:700;color:'+T.ink+';">'+escapeHtml(item.who)+'</strong> '+escapeHtml(item.text)+
        ' <span style="font-size:13px;">'+item.emoji+'</span>' +
      '</div>' +
    '</div>';
    idx++;

  paint();

// ── Confetti (CSS particles) ─────────────────────────────────────────────
function fireConfettiOnce(key, container) {
  if (!container) return;
  try { if (sessionStorage.getItem('tab-confetti-' + key)) return; } catch (e) {}
  try { sessionStorage.setItem('tab-confetti-' + key, '1'); } catch (e) {}
  var colors = [T.tomato, T.coral, T.golden, T.olive, T.cherry];
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;';
  for (var i = 0; i < 28; i++) {
    var x = 6 + Math.random() * 88;
    var delay = Math.random() * 0.7;
    var dur = 1.6 + Math.random() * 1.2;
    var color = colors[i % colors.length];
    var rot = Math.random() * 360;
    var size = 6 + Math.random() * 6;
    var shape = Math.random() > 0.5 ? '50%' : '2px';
    var drift = (-30 + Math.random() * 60).toFixed(0);
    var s = document.createElement('span');
    s.style.cssText = 'position:absolute;top:-20px;left:'+x+'%;width:'+size+'px;height:'+size+
      'px;border-radius:'+shape+';background:'+color+
      ';transform:rotate('+rot+'deg);animation:confettiFall '+dur+'s '+delay+
      's cubic-bezier(0.45,0,0.55,1) forwards;opacity:0;--drift:'+drift+'px;';
    wrap.appendChild(s);
  }
  container.appendChild(wrap);
  setTimeout(function() { wrap.remove(); }, 3500);
}

// ── Toast ────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var existing = document.querySelector('.tab-toast');
  if (existing) existing.remove();
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  var el = document.createElement('div');
  el.className = 'tab-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  _toastTimer = setTimeout(function() { el.remove(); _toastTimer = null; }, 2000);
}

// ── Live-dinner detection on dashboard ───────────────────────────────────
function liveDinnerFromList(dinners) {
  var twelveHrsAgo = Date.now() - 12 * 3600 * 1000;
  for (var i = 0; i < dinners.length; i++) {
    var d = dinners[i];
    var t = d.created_at ? new Date(d.created_at).getTime() : 0;
    if (t < twelveHrsAgo) continue;
    if ((d.order_count || 0) === 0) return d;
    var ords = d.orders || [];
    if (ords.length === 0) return d;
    var anyOpen = false;
    for (var j = 0; j < ords.length; j++) {
      if (ords[j].final_owes == null) { anyOpen = true; break; }
    }
    if (anyOpen) return d;
  }
  return null;
}

// ── Linear host-journey progress bar (tappable + gated) ────────────────
function progressBarHTML(step) {
  var steps = [
    { key: 'scan',   label: 'Scan'   },
    { key: 'share',  label: 'Share'  },
    { key: 'settle', label: 'Settle' },
  ];
  var order = { scan: 0, share: 1, settle: 2 };
  var ci = order[step];
  if (ci == null) return '';
  // Gating
  var receiptOK = !!(receiptData && receiptData.confirmed);
  var anyPicks = participants.some(function(p){ return p.has_picked; }) || orders.length > 0;
  var enabled = { scan: true, share: receiptOK, settle: receiptOK && anyPicks };
  var html =
    '<div style="position:sticky;top:0;left:0;right:0;background:'+T.cream+
    ';z-index:30;padding:14px 22px 12px;border-bottom:1px solid '+T.ruleSoft+';">' +
      '<div style="display:flex;align-items:center;gap:4px;max-width:380px;margin:0 auto;">';
  steps.forEach(function(s, i) {
    var isActive = i === ci;
    var isDone   = i < ci;
    var isEnabled = enabled[s.key];
    var canTap = isEnabled && !isActive;
    var dotColor = isActive ? T.tomato : isDone ? T.olive : (isEnabled ? T.inkSoft : T.inkDim);
    var dotBg    = (isActive || isDone) ? dotColor : 'transparent';
    var contentColor = (isActive || isDone) ? '#fff' : dotColor;
    var dotContent = isDone ? '✓' : (i + 1);
    var labelColor = isActive ? T.tomato : isDone ? T.olive : (isEnabled ? T.inkSoft : T.inkDim);
    var opacity = isEnabled ? '1' : '0.55';
    var cursor  = canTap ? 'pointer' : (isActive ? 'default' : 'not-allowed');
    var tapAttr = canTap ? ' onclick="navigateToStep(\''+s.key+'\')"' : '';
    html +=
      '<div'+tapAttr+' role="button" aria-disabled="'+(!isEnabled)+'" style="display:flex;align-items:center;gap:7px;cursor:'+cursor+';opacity:'+opacity+';' +
        (i < 2 ? 'flex:1;' : 'flex-shrink:0;')+'-webkit-tap-highlight-color:transparent;">' +
        '<div style="width:22px;height:22px;border-radius:999px;border:1.5px solid '+dotColor+';background:'+dotBg+
          ';color:'+contentColor+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">' +
          dotContent +
        '</div>' +
        '<div style="font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+labelColor+';">' +
          s.label +
        '</div>' +
      '</div>' +
      (i < 2 ? '<div style="flex:1;height:2px;background:'+(isDone ? T.olive : T.rule)+';border-radius:999px;margin:0 4px;"></div>' : '');
  });
  html += '</div></div>';
  return html;
}

function navigateToStep(step) {
  if (step === 'scan')  return setHostSheet('scan');
  if (step === 'share') {
    if (!(receiptData && receiptData.confirmed)) { showToast('Confirm the receipt first'); return; }
    return setHostSheet('share');
  }
  if (step === 'settle') {
    if (!(receiptData && receiptData.confirmed)) { showToast('Confirm the receipt first'); return; }
    if (!(participants.some(function(p){ return p.has_picked; }) || orders.length > 0)) {
      showToast('Wait on the first pick');
      return;
    }
    return setHostSheet(null);
  }
}

function scrollTopReset() {
  try { window.scrollTo(0, 0); } catch (e) {}
  try { document.documentElement.scrollTop = 0; } catch (e) {}
  try { document.body.scrollTop = 0; } catch (e) {}
}

function updateReceiptField(el) {
  var v = parseFloat(el.value) || 0;

  if (el.id === 'r-total') receiptData.receiptTotal = v;
  refreshMatchBanner();

function matchBannerHTML() {
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  var tax = parseFloat(receiptData.tax) || 0;
  var tip = parseFloat(receiptData.tip) || 0;
  var printed = parseFloat(receiptData.receiptTotal) || 0;
  if (!printed) {
    if (!sub && !tax && !tip) return '';
    return '<div style="padding:10px 12px;background:'+T.paper+';border-radius:12px;font-size:12.5px;color:'+T.inkSoft+';font-weight:500;">' +
      'No printed total to check against. Make sure items + tax + tip add up to what you paid.' +
    '</div>';
  }
  var sum = sub + tax + tip;
  var diff = Math.abs(sum - printed);
  if (diff < 0.10) {
    return '<div style="padding:10px 12px;background:rgba(95,107,58,0.12);border-radius:12px;font-size:12.5px;color:'+T.olive+';font-weight:700;">✓ Adds up</div>';
  }
  return '<div style="padding:10px 12px;background:rgba(242,184,84,0.20);border-radius:12px;font-size:12.5px;color:#854f0b;font-weight:500;line-height:1.4;">' +
    '⚠ Hmm, this doesn’t add up to the printed total of $'+printed.toFixed(2)+' — off by $'+diff.toFixed(2)+'. Edit any field above.' +
  '</div>';
}

function refreshMatchBanner() {
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  receiptData.subtotal = round2(sub);
  var subEl = document.getElementById('totals-subtotal');
  if (subEl) subEl.innerHTML = moneyHTML(sub);
  var bannerEl = document.getElementById('receipt-match-banner');
  if (bannerEl) bannerEl.innerHTML = matchBannerHTML();

  var hostFirst = ((currentDinner && currentDinner.hostName) || 'Your friend').split(/\s+/)[0];

      title: rest,
      text: hostFirst + ' sent you the bill — tap to claim what you ate 🍝',
      url: url,

  } else {
    copyEaterLink();
    if (hostSheet === 'share') setTimeout(function() { setHostSheet(null); }, 600);
  }

    .on('postgres_changes', {

async function refreshDashboard() {
  var data = [];
  try {
    var res = await supabase
      .from('dinners')
      .select('id, restaurant, name, date, order_count, created_at, orders(final_owes)')
      .eq('host_id', currentUser.id)
      .order('created_at', { ascending: false });
    if (res.error) { console.warn('refreshDashboard error:', res.error); }
    else { data = res.data || []; }
  } catch (e) {
    console.warn('refreshDashboard threw:', e);
  }
  dashboardDinners = data;
  // Always render — even on failure, so the user never hangs on Loading…
  try { renderTabHome(dashboardDinners); }
  catch (e) { console.error('renderTabHome threw:', e); }
}

async function confirmDeleteTab(id) {
  dismissDeleteTab();
  // Optimistic remove + immediate re-render
  var snapshot = dashboardDinners.slice();
  var removedIdx = dashboardDinners.findIndex(function(d){ return d.id === id; });
  if (removedIdx >= 0) {
    dashboardDinners.splice(removedIdx, 1);
    renderTabHome(dashboardDinners);
  }
  var res = await supabase.from('dinners').delete().eq('id', id);
  if (res.error) {
    // Restore on failure
    dashboardDinners = snapshot;
    renderTabHome(dashboardDinners);
    showToast('Delete failed — ' + (res.error.message || 'try again'));
    return;
  }
  showToast('Tab deleted');
}

// ── HOST DINNER VIEW + sheets (TabClaim) ─────────────────────────────────
async function showHostDinner() {
  await removeChannelSafe(dinnerChannel); dinnerChannel = null;
  stopTicker();
  document.getElementById('app').innerHTML =
    '<div class="tab-app"><div style="padding:80px 24px;text-align:center;color:'+T.inkSoft+';font-size:14px;">Loading…</div></div>';
  var raw = await fetchDinnerRaw(sessionId);
  if (!raw) { showHostDashboard(); return; }
  currentDinner = normalizeDinner(raw);
  window._dinnerHostName = currentDinner.hostName || '';
  receiptData = currentDinner.receiptData;
  menuItems = currentDinner.menuItems || [];
  // Linear flow: send a fresh dinner straight to scan; confirmed → live claim view
  hostSheet = (receiptData && receiptData.confirmed) ? null : 'scan';
  // Host is automatically a participant (idempotent, best-effort)
  if (currentDinner.hostName) {
    try {
      supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: currentDinner.hostName })
        .catch(function(e) { console.warn('join_dinner failed:', e); });
    } catch (e) { /* swallow */ }
  }
  // Render the current sheet immediately with whatever state we have so the
  // loading placeholder never lingers if realtime/queries are slow.
  try { renderHostSheetForCurrent(); }
  catch (e) { console.error('initial render threw:', e); }
  listenOrders();
  // Best-effort live data top-up; refreshOrders is itself fail-soft now.
  refreshOrders();
}

function listenOrders() {
  removeChannelSafe(dinnerChannel);
  dinnerChannel = supabase
    .channel('dinner-' + sessionId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders',       filter: 'dinner_id=eq.' + sessionId }, function() { refreshOrders(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' },                                       function() { refreshOrders(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'participants', filter: 'dinner_id=eq.' + sessionId }, function() { refreshOrders(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'dinners', filter: 'id=eq.' + sessionId }, function(payload) {
      if (payload && payload.new) {
        if (payload.new.menu_items)   menuItems   = payload.new.menu_items;
        if (payload.new.receipt_data) receiptData = payload.new.receipt_data;
        if (currentDinner) {
          currentDinner.menuItems = menuItems;
          currentDinner.receiptData = receiptData;
        }
        renderHostSheetForCurrent();
      }
    })
    .subscribe();
}

async function refreshOrders() {
  try {
    var both = await Promise.all([
      fetchOrdersForDinner(sessionId),
      fetchParticipants(sessionId),
    ]);
    orders = both[0] || [];
    participants = both[1] || [];
  } catch (e) {
    console.warn('refreshOrders rejected:', e);
    orders = orders || [];
    participants = participants || [];
  }
  // Render even on partial failure so the host never hangs on Loading…
  try { renderHostSheetForCurrent(); }
  catch (e) { console.error('renderHostSheetForCurrent threw:', e); }
}

function renderHostSheetForCurrent() {
  if (hostSheet === null)           return renderHostClaim();
  if (hostSheet === 'scan')         return renderHostScanSheet();
  if (hostSheet === 'share')        return renderHostShareScreen();
  if (hostSheet === 'add-eaters')   return renderHostAddEatersSheet();
  if (hostSheet === 'settle')       return renderHostSettleSheet();
  if (hostSheet === 'mismatch')     return renderHostMismatchScreen();
  if (hostSheet === 'paid')         return renderHostPaidSheet();
  if (hostSheet === 'edit-order')   return renderHostEditOrderSheet();
}

function setHostSheet(name, ctx) {
  hostSheet = name;
  editingOrderCtx = (name === 'edit-order' ? ctx : null);
  renderHostSheetForCurrent();
}

async function toggleHostItemClaim(idx) {
  var hostName = window._dinnerHostName;
  if (!hostName) { showToast('Set your name on this tab first'); return; }
  var item = menuItems[idx];
  if (!item) return;
  if (item.claimedBy && item.claimedBy !== hostName) return;
  // Optimistic local toggle
  var nextClaim = item.claimedBy === hostName ? null : hostName;
  menuItems[idx] = Object.assign({}, item, { claimedBy: nextClaim });
  renderHostClaim();
  // Recompute host's full claim list
  var indices = [];
  var items = [];
  var subtotal = 0;
  menuItems.forEach(function(m, i) {
    if (m.claimedBy === hostName) {
      indices.push(i);
      items.push({ name: m.name, price: parseFloat(m.price) || 0 });
      subtotal += parseFloat(m.price) || 0;
    }
  });
  try {
    var r1 = await supabase.rpc('claim_menu_items', {
      p_dinner_id: sessionId, p_eater_name: hostName, p_indices: indices,
    });
    if (r1.error) throw r1.error;
    if (items.length > 0) {
      var r2 = await supabase.rpc('upsert_order_with_items', {
        p_dinner_id: sessionId, p_eater_name: hostName,
        p_subtotal: round2(subtotal), p_is_host: true, p_items: items,
      });
      if (r2.error) throw r2.error;
      // Host has picked
      supabase.rpc('mark_picked', { p_dinner_id: sessionId, p_name: hostName }).catch(function() {});
    } else {
      await supabase.from('orders').delete().eq('dinner_id', sessionId).eq('eater_name', hostName);
    }
  } catch (e) {
    showToast('Sync hiccup — refreshing');
  }
}

function copyEaterLink() {
  var url = window.location.origin + window.location.pathname + '?mode=eater&session=' + sessionId;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      showToast('Link copied — paste it to friends ✨');
    }).catch(function() { showToast('Copy failed — long-press the link'); });
  } else {
    showToast('Copy not supported here');
  }
}

async function clearOrders() {
  if (!confirm('Clear every claim on this tab? Cannot be undone.')) return;
  var res = await supabase.from('orders').delete().eq('dinner_id', sessionId);
  if (res.error) { alert('Error: ' + res.error.message); return; }
  // Also clear claimedBy on menu items
  var cleared = (menuItems || []).map(function(m) { var c = Object.assign({}, m); delete c.claimedBy; return c; });
  await supabase.from('dinners').update({ menu_items: cleared }).eq('id', sessionId);
  showToast('Cleared. Open table.');
}

function scanReceipt() {
  var inp = document.getElementById('receipt-img');
  var file = inp && inp.files[0];
  if (!file) return;
  receiptData._lastFileName = file.name;
  var status = document.getElementById('scan-status');
  if (status) status.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;color:'+T.tomato+';font-weight:600;">' +
      '<div style="width:18px;height:18px;border:2px solid '+T.tomato+';border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div>' +
      'Reading receipt…' +
    '</div>';

  var img = new Image();
  var objectUrl = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(objectUrl);
    var canvas = document.createElement('canvas');
    var maxSize = 1200;
    var w = img.width, h = img.height;
    if (w > maxSize || h > maxSize) {
      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else       { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

    var totalsCall = fetch('https://zubillscanner.zuhayr-daya.workers.dev', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mediaType: 'image/jpeg', mode: 'totals' }),
    }).then(function(r) { return r.json(); });

    var itemsCall = fetch('https://zubillscanner.zuhayr-daya.workers.dev', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mediaType: 'image/jpeg', mode: 'items' }),
    }).then(function(r) { return r.json(); });

    Promise.all([totalsCall, itemsCall]).then(function(results) {
      var totalsRes = results[0];
      var itemsRes  = results[1];

      if (totalsRes && totalsRes.success && totalsRes.data) {
        var d = totalsRes.data;
        if (d.subtotal != null) receiptData.subtotal     = parseFloat(d.subtotal);
        if (d.tax      != null) receiptData.tax          = parseFloat(d.tax);
        if (d.tip      != null) receiptData.tip          = parseFloat(d.tip);
        if (d.total    != null) receiptData.receiptTotal = parseFloat(d.total);
      }

      if (itemsRes && itemsRes.success && itemsRes.data && itemsRes.data.length > 0) {
        var expanded = [];
        itemsRes.data.forEach(function(item) {
          var qty = item.qty || 1;
          for (var i = 0; i < qty; i++) {
            expanded.push({ name: item.name, price: parseFloat(item.price) || 0, claimedBy: null });
          }
        });
        menuItems = expanded;
      }
      renderHostScanSheet();
    }).catch(function(e) {
      var st = document.getElementById('scan-status');
      if (st) st.innerHTML = '<span style="color:'+T.tomato+';">Error: '+escapeHtml(e.message || e)+'</span>';
    });
  };
  img.src = objectUrl;
}

async function confirmReceiptTotals() {
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  var tax = parseFloat(receiptData.tax) || 0;
  var tip = parseFloat(receiptData.tip) || 0;

  receiptData.subtotal = round2(sub);

  var update = { receipt_data: receiptData, menu_items: menuItems };
  if (menuItems && menuItems.length > 0) update.menu_sent_at = new Date().toISOString();

  setHostSheet('share');
}

async function saveAllOrders() {
  var persons = document.querySelectorAll('#order-persons-list > div');
  if (persons.length === 0) { showToast('Add at least one person'); return; }
  var toSave = []; var valid = true;
  persons.forEach(function(p) {
    var nameEl = p.querySelector('.person-name');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) { showToast('Enter a name for each person'); valid = false; return; }
    var isHost = !!p.querySelector('.is-host-check').checked;
    var items = []; var subtotal = 0;
    p.querySelectorAll('.person-items-list > div').forEach(function(row) {
      var n = row.querySelector('.pitem-name').value.trim();
      var pr = parseFloat(row.querySelector('.pitem-price').value) || 0;
      if (n || pr) { items.push({ name: n || 'Item', price: pr }); subtotal += pr; }
    });
    if (items.length === 0) { showToast('Add at least one item for ' + name); valid = false; return; }
    toSave.push({ name: name, items: items, subtotal: round2(subtotal), isHost: isHost });
  });
  if (!valid) return;
  var status = document.getElementById('add-order-status');
  if (status) status.textContent = 'Saving…';
  try {
    // Register each as joined first (idempotent)
    await Promise.all(toSave.map(function(o) {
      return supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: o.name }).catch(function(){});
    }));
    var results = await Promise.all(toSave.map(function(o) {
      return supabase.rpc('upsert_order_with_items', {
        p_dinner_id: sessionId, p_eater_name: o.name,
        p_subtotal: o.subtotal, p_is_host: !!o.isHost, p_items: o.items,
      });
    }));
    var firstError = results.find(function(r){ return r.error; });
    if (firstError) throw firstError.error;
    // Mark each as picked
    toSave.forEach(function(o) {
      supabase.rpc('mark_picked', { p_dinner_id: sessionId, p_name: o.name }).catch(function(){});
    });
    showToast('Saved ✓');
    setHostSheet(null);
  } catch (e) {
    if (status) status.textContent = 'Error: ' + (e.message || e);
  }
}

function calculateFromClaims() {
  if (orders.length === 0) { showToast('No orders yet'); return; }
  var feesTotal = (receiptData.fees || []).reduce(function(s,f){ return s+(f.amount||0); }, 0);
  var foodSubtotal = orders.reduce(function(s,o){ return s+(o.subtotal||0); }, 0);
  var gap = Math.round(((receiptData.subtotal||0) - foodSubtotal) * 100) / 100;
  if (Math.abs(gap) > 0.10) {
    pendingCalcData = { gap: gap, foodSubtotal: foodSubtotal };
    setHostSheet('mismatch');
    return;
  }
  doCalculate(false);
}
function doCalculate(hostAbsorbs) {
  var foodSubtotal = orders.reduce(function(s,o){ return s+(o.subtotal||0); }, 0);
  var gap = Math.round(((receiptData.subtotal||0) - foodSubtotal) * 100) / 100;
  lastResults = orders.map(function(o) {
    var sub = o.subtotal || 0;
    var prop = foodSubtotal > 0 ? sub/foodSubtotal : 1/orders.length;
    var adjusted = hostAbsorbs ? sub : sub + (prop * gap);
    var tax = prop * (receiptData.tax || 0);
    var tip = prop * (receiptData.tip || 0);
    var feeShare = 0;
    (receiptData.fees || []).forEach(function(f) {
      if (!f.amount) return;
      if (f.split === 'person') { if (f.person === o.name) feeShare += f.amount; }
      else { feeShare += f.amount / orders.length; }
    });
    var total = adjusted + tax + tip + feeShare;
    return {
      name: o.name, subtotal: sub, tax: tax, tip: tip,
      feeShare: feeShare, total: total,
      tipPct: receiptData.tipPct || 0, isHost: o.isHost,
    };
  });
  totalsSent = false;
  setHostSheet('settle');
}

async function notifyEaters() {
  if (!lastResults || lastResults.length === 0) { showToast('Calculate the split first'); return; }
  var btn = document.getElementById('notify-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
  var updates = lastResults.filter(function(r) {
    var match = orders.find(function(o){ return o.name === r.name && o.isHost; });
    return !match;
  }).map(function(r) {
    return {
      name: r.name,
      final_owes: round2(r.total),
      tax_share: round2(r.tax),
      tip_share: round2(r.tip),
      tip_pct: r.tipPct || 0,
    };
  });
  try {
    var results = await Promise.all(updates.map(function(u) {
      return supabase.from('orders').update({
        final_owes: u.final_owes, tax_share: u.tax_share,
        tip_share: u.tip_share, tip_pct: u.tip_pct,
      }).eq('dinner_id', sessionId).eq('eater_name', u.name);
    }));
    var firstError = results.find(function(r){ return r.error; });
    if (firstError) throw firstError.error;
    totalsSent = true;
    showToast('Totals sent ✨');
    renderHostSettleSheet();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Send totals to eaters →'; }
    alert('Error: ' + (e.message || e));
  }
}

async function fetchEaterOrder(name) {
  var res = await supabase.from('orders')
    .select('id, subtotal, final_owes, tax_share, tip_share, tip_pct, order_items(name, price)')
    .eq('dinner_id', sessionId).eq('eater_name', name).maybeSingle();
  if (res.error || !res.data) return null;
  var d = res.data;
  return {
    items: (d.order_items || []).map(function(i){ return { name: i.name, price: parseFloat(i.price) }; }),
    subtotal: parseFloat(d.subtotal) || 0,
    finalOwes: d.final_owes != null ? parseFloat(d.final_owes) : undefined,
    taxShare: d.tax_share != null ? parseFloat(d.tax_share) : undefined,
    tipShare: d.tip_share != null ? parseFloat(d.tip_share) : undefined,
    tipPct: d.tip_pct != null ? parseFloat(d.tip_pct) : undefined,
  };
}

async function showEaterView() {
  stopTicker();
  await removeChannelSafe(dinnerChannel); dinnerChannel = null;
  await removeChannelSafe(dashboardChannel); dashboardChannel = null;
  await removeChannelSafe(eaterChannel); eaterChannel = null;
  eaterFirstRender = true;
  eaterCtx = {};
  document.getElementById('app').innerHTML =
    '<div class="tab-app tab-fade-in"><div style="padding:80px 24px;text-align:center;color:'+T.inkSoft+';">Loading the tab…</div></div>';
  var raw = await fetchDinnerRaw(sessionId);
  if (!raw) {
    document.getElementById('app').innerHTML =
      '<div class="tab-app tab-fade-in"><div style="padding:80px 24px;text-align:center;color:'+T.tomato+';font-weight:600;">Tab not found. Ask your host for the link.</div></div>';
    return;
  }
  var dinner = normalizeDinner(raw);
  currentDinner = dinner;
  menuItems = dinner.menuItems || [];
  receiptData = dinner.receiptData;
  // Load this dinner's orders for social-proof + ticker
  orders = await fetchOrdersForDinner(sessionId);

  var savedName = localStorage.getItem('eater-name-' + sessionId);
  eaterCtx = { dinner: dinner, selectedIndices: [] };
  if (savedName) {
    // Idempotently register as joined the moment we know who they are
    eaterJoinIfNeeded(savedName);
    var existing = await fetchEaterOrder(savedName);
    if (existing && existing.finalOwes != null) {
      eaterCtx.name = savedName;
      eaterCtx.order = existing;
      setEaterStage('settled');
      return;
    }
    if (existing) {
      eaterCtx.name = savedName;
      eaterCtx.order = existing;
      setEaterStage('waiting');
      return;
    }
    eaterCtx.prefillName = savedName;
  }
  // Seed selectedIndices from any pre-claimed items for this name
  if ((eaterCtx.prefillName || '') && menuItems.length > 0) {
    menuItems.forEach(function(m, i) { if (m.claimedBy === eaterCtx.prefillName) eaterCtx.selectedIndices.push(i); });
  }
  setEaterStage('claiming');
}

function toggleEaterClaim(el) {
  var idx = parseInt(el.dataset.idx);
  if (!eaterCtx.selectedIndices) eaterCtx.selectedIndices = [];
  var pos = eaterCtx.selectedIndices.indexOf(idx);
  var rightDiv = el.lastElementChild;
  if (pos >= 0) {
    eaterCtx.selectedIndices.splice(pos, 1);
    el.classList.remove('is-mine');
    var p = rightDiv && rightDiv.querySelector('.eater-you-pill');
    if (p) p.remove();
  } else {
    eaterCtx.selectedIndices.push(idx);
    el.classList.add('is-mine');
    if (rightDiv && !rightDiv.querySelector('.eater-you-pill')) {
      var pill = document.createElement('div');
      pill.className = 'eater-you-pill';
      pill.style.cssText = 'font-size:10px;font-weight:700;color:'+T.tomato+';margin-top:2px;letter-spacing:0.4px;';
      pill.textContent = 'YOU';
      rightDiv.appendChild(pill);
    }
  }
  updateEaterRunningTotal();
  // Update bar enabled-state if count went 0↔non-zero
  var sendBtn = document.querySelector('.tab-sticky-bar .tab-grad-btn');
  if (sendBtn) sendBtn.disabled = (eaterCtx.selectedIndices.length === 0);
}

function computeEaterRunningTotal() {
  var hasMenu = (menuItems || []).length > 0;
  var sum = 0;
  if (hasMenu) {
    (eaterCtx.selectedIndices || []).forEach(function(i) {
      var m = menuItems[i];
      if (m) sum += parseFloat(m.price) || 0;
    });
  } else {
    document.querySelectorAll('#items-list .item-row').forEach(function(r) {
      sum += parseFloat(r.querySelector('.item-price').value) || 0;
    });
  }
  if (receiptData && receiptData.confirmed && receiptData.subtotal) {
    var prop = sum / receiptData.subtotal;
    sum += prop * (receiptData.tax || 0);
    sum += prop * (receiptData.tip || 0);
  }
  return sum;
}

function updateEaterRunningTotal() {
  var el = document.getElementById('eater-running');
  if (el) el.innerHTML = moneyHTML(computeEaterRunningTotal(), { color: T.cream });
}

async function submitEaterOrder() {
  var nameEl = document.getElementById('guest-name');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('Drop your name first'); return; }
  var hasMenu = (menuItems || []).length > 0;
  var items = []; var subtotal = 0;
  var indices = (eaterCtx.selectedIndices || []).slice();
  if (hasMenu) {
    if (indices.length === 0) { showToast('Tap at least one item'); return; }
    indices.forEach(function(i) {
      var m = menuItems[i];
      if (!m) return;
      items.push({ name: m.name, price: parseFloat(m.price) || 0 });
      subtotal += parseFloat(m.price) || 0;
    });
  } else {
    document.querySelectorAll('#items-list .item-row').forEach(function(r) {
      var n = r.querySelector('.item-name').value.trim();
      var p = parseFloat(r.querySelector('.item-price').value) || 0;
      if (n || p) { items.push({ name: n || 'Item', price: p }); subtotal += p; }
    });
    if (items.length === 0) { showToast('Add at least one item'); return; }
  }
  var sendBtn = document.querySelector('.tab-sticky-bar .tab-grad-btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; }
  try {
    // Ensure participant exists (idempotent) before submitting picks
    try { await supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: name }); } catch (e) {}
    var r1 = await supabase.rpc('upsert_order_with_items', {
      p_dinner_id: sessionId, p_eater_name: name,
      p_subtotal: round2(subtotal), p_is_host: false, p_items: items,
    });
    if (r1.error) throw r1.error;
    if (hasMenu) {
      var r2 = await supabase.rpc('claim_menu_items', {
        p_dinner_id: sessionId, p_eater_name: name, p_indices: indices,
      });
      if (r2.error) throw r2.error;
    }
    // Flip participant.has_picked → true (best-effort, doesn't block UI)
    supabase.rpc('mark_picked', { p_dinner_id: sessionId, p_name: name }).catch(function() {});
    localStorage.setItem('eater-name-' + sessionId, name);
    localStorage.setItem('last-eater-session', sessionId);
    // Refresh orders for social proof on settled screen later
    orders = await fetchOrdersForDinner(sessionId);
    eaterCtx.name = name;
    eaterCtx.order = { items: items, subtotal: subtotal };
    setEaterStage('waiting');
  } catch (e) {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Send picks'; }
    showToast('Error: ' + (e.message || e));
  }
}

function setupEaterRealtime() {
  removeChannelSafe(eaterChannel);
  var name = eaterCtx.name;
  if (!name) return;
  eaterChannel = supabase
    .channel('eater-' + sessionId + '-' + name)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'orders',
      filter: 'dinner_id=eq.' + sessionId,
    }, async function(payload) {
      if (payload && payload.new && payload.new.eater_name === name && payload.new.final_owes != null) {
        await removeChannelSafe(eaterChannel); eaterChannel = null;
        var order = await fetchEaterOrder(name);
        if (order) {
          orders = await fetchOrdersForDinner(sessionId);
          eaterCtx.order = order;
          setEaterStage('settled');
        }
      }
    })
    .subscribe();
}

function payViaZelle() {
  var amount = (eaterCtx.order && eaterCtx.order.finalOwes) || 0;
  var amt = amount.toFixed(2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(amt).catch(function(){});
  }
  showToast('$' + amt + ' copied');
  setTimeout(function() { try { window.location.href = 'zelle://'; } catch (e) {} }, 100);
}

function payViaVenmo() {
  var d = eaterCtx.dinner;
  var amount = (eaterCtx.order && eaterCtx.order.finalOwes) || 0;
  var amt = amount.toFixed(2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(amt).catch(function(){});
  }
  showToast('$' + amt + ' copied');
  var handle = (d && d.payMethod === 'Venmo' && d.payHandle) ? d.payHandle.replace(/^@/, '') : '';
  var url = handle
    ? ('venmo://paycharge?txn=pay&recipients=' + encodeURIComponent(handle) + '&amount=' + amt)
    : 'venmo://';
  setTimeout(function() { try { window.location.href = url; } catch (e) {} }, 100);
}

async function editEaterOrder() {
  var name = eaterCtx.name || localStorage.getItem('eater-name-' + sessionId);
  if (!name) return;
  var hasMenu = (menuItems || []).length > 0;
  if (hasMenu) {
    eaterCtx.selectedIndices = [];
    menuItems.forEach(function(m, i) { if (m.claimedBy === name) eaterCtx.selectedIndices.push(i); });
    eaterCtx.prefillItems = null;
  } else {
    var order = await fetchEaterOrder(name);
    eaterCtx.prefillItems = order ? order.items : [];
  }
  eaterCtx.name = name;
  setEaterStage('claiming');
}
