function scanReceipt() {
  var inp = document.getElementById('receipt-img');
  var file = inp && inp.files[0];
  if (!file) return;
  receiptData._lastFileName = file.name;
  var status = document.getElementById('scan-status');
  if (status) status.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;color:'+T.tomato+';font-weight:600;">' +
      '<div style="width:18px;height:18px;border:2px solid '+T.tomato+';border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div>' +
      'Reading receipt…' +
    '</div>';

  var img = new Image();
  var objectUrl = URL.createObjectURL(file);
  img.onload = async function() {
    URL.revokeObjectURL(objectUrl);
    var canvas = document.createElement('canvas');
    var maxSize = 1200;
    var w = img.width, h = img.height;
    if (w > maxSize || h > maxSize) {
      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else       { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
    var base64 = dataUrl.split(',')[1];
    // Keep a viewable copy in module scope. Underscore-prefixed → stripped
    // before any Supabase write by stripReceiptInternal().
    receiptData._previewImage = dataUrl;

    // Durable backing for the image — upload to Supabase Storage so the
    // receipt survives refresh / cross-device opens. Non-fatal: if it
    // fails we still have _previewImage for this session and the user
    // can re-scan later.
    if (currentUser && sessionId) {
      try {
        var blob = dataURLtoBlob(dataUrl);
        var path = currentUser.id + '/' + sessionId + '.jpg';
        var upRes = await supabase.storage.from('receipts').upload(path, blob, {
          contentType: 'image/jpeg', upsert: true,
        });
        if (upRes.error) {
          console.error('[RECEIPT UPLOAD] failed:', upRes.error);
        } else {
          var pub = supabase.storage.from('receipts').getPublicUrl(path);
          // Cache-bust on re-scan so the new image actually shows.
          receiptData.image_url = pub.data.publicUrl + '?v=' + Date.now();
        }
      } catch (e) {
        console.error('[RECEIPT UPLOAD] threw:', e);
      }
    }

    // SINGLE structured-mode call. Worker returns items, food_subtotal, tax,
    // automatic_gratuity, additional_tip, fees[], grand_total, warnings[].
    fetch('https://zubillscanner.zuhayr-daya.workers.dev', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mediaType: 'image/jpeg', mode: 'full' }),
    }).then(function(r) { return r.json(); }).then(function(res) {
      if (!res || !res.success || !res.data) {
        var st = document.getElementById('scan-status');
        if (st) st.innerHTML = '<span style="color:'+T.tomato+';">Scan failed — try a clearer photo.</span>';
        return;
      }
      var d = res.data;
      // Items: expand "N Item (price)" style entries AND legacy qty>1 into
      // individually claimable rows, with shared groupId for the host view.
      if (Array.isArray(d.items) && d.items.length > 0) {
        var expanded = [];
        d.items.forEach(function(item) {
          processScannedItem(item).forEach(function(p) { expanded.push(p); });
        });
        menuItems = expanded;
      }
      // Top-level numeric fields → existing receiptData slots
      if (d.food_subtotal     != null) receiptData.subtotal     = parseFloat(d.food_subtotal);
      if (d.tax               != null) receiptData.tax          = parseFloat(d.tax);
      if (d.automatic_gratuity!= null) receiptData.serviceFee   = parseFloat(d.automatic_gratuity);
      if (d.additional_tip    != null) receiptData.tip          = parseFloat(d.additional_tip);
      if (d.grand_total       != null) receiptData.receiptTotal = parseFloat(d.grand_total);
      // Scanner-detected fees: replace any prior scanner-origin fees, preserve host-added ones
      receiptData.fees = (receiptData.fees || []).filter(function(f){ return !f.scannerOrigin; });
      if (Array.isArray(d.fees)) {
        d.fees.forEach(function(f) {
          receiptData.fees.push({
            name: f.name || 'Fee',
            amount: parseFloat(f.amount) || 0,
            proportional: false,
            scannerOrigin: true,
          });
        });
      }
      // Warnings for the new banner
      receiptData.scanWarnings = Array.isArray(d.warnings) ? d.warnings.slice() : [];
      saveScanStateDebounced();
      renderHostScanSheet();
    }).catch(function(e) {
      var st = document.getElementById('scan-status');
      if (st) st.innerHTML = '<span style="color:'+T.tomato+';">Error: '+escapeHtml(e.message || e)+'</span>';
    });
  };
  img.src = objectUrl;
}

async function confirmReceiptTotals() {
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  var tax = parseFloat(receiptData.tax) || 0;
  var service = parseFloat(receiptData.serviceFee) || 0;
  var tip = parseFloat(receiptData.tip) || 0;
  var customs = (receiptData.fees || []).reduce(function(s,f){ return s + (parseFloat(f.amount)||0); }, 0);
  if (!sub && !tax && !service && !tip && !customs) { showToast('Add items or amounts first'); return; }
  // Explicit-override reconciliation gate
  var printed = parseFloat(receiptData.receiptTotal) || 0;
  var ourSum = sub + tax + service + tip + customs;
  if (printed > 0 && Math.abs(ourSum - printed) >= 0.10) {
    var diff = Math.abs(ourSum - printed);
    if (!confirm("It’s off by $" + diff.toFixed(2) + " — split anyway?")) return;
  }
  // Idempotency UX: lock the button while we write.
  var btn = document.getElementById('confirm-receipt-btn');
  var btnLabel = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Opening…'; }
  receiptData.subtotal = round2(sub);
  receiptData.tax = tax;
  receiptData.serviceFee = service;
  receiptData.tip = tip;
  receiptData.confirmed = true;
  var update = { receipt_data: stripReceiptInternal(receiptData), menu_items: menuItems };
  if (menuItems && menuItems.length > 0) update.menu_sent_at = new Date().toISOString();
  var res = await supabase.from('dinners').update(update).eq('id', sessionId);
  if (res.error) {
    console.error('[confirmReceiptTotals] failed:', res.error);
    var em = res.error.message || res.error.hint || 'try again';
    showToast("Couldn't open the tab — " + em);
    if (btn) { btn.disabled = false; btn.textContent = btnLabel || 'Confirm & open the tab →'; }
    return;
  }
  clearScanState();
  setHostSheet('share');
}

async function sendMenuToEaters() {
  if (!menuItems || menuItems.length === 0) { showToast('No items to send'); return; }
  var res = await supabase.from('dinners').update({
    menu_items: menuItems,
    menu_sent_at: new Date().toISOString(),
  }).eq('id', sessionId);
  if (res.error) { showToast('Error: ' + res.error.message); return; }
  showToast('Menu sent ✨');
}

function calculateFromClaims() {
  if (orders.length === 0) { showToast('No orders yet'); return; }
  // Detect unclaimed food (real menu items without a claimedBy, or, in
  // manual mode, the gap between receipt subtotal and sum of order subtotals).
  var unclaimedValue = 0;
  if (menuItems && menuItems.length > 0) {
    unclaimedValue = menuItems
      .filter(function(m){ return !m.claimedBy; })
      .reduce(function(s,m){ return s + (parseFloat(m.price)||0); }, 0);
  } else {
    var foodSubtotal = orders.reduce(function(s,o){ return s+(o.subtotal||0); }, 0);
    unclaimedValue = Math.max(0, Math.round(((receiptData.subtotal||0) - foodSubtotal) * 100) / 100);
  }
  if (unclaimedValue >= 0.10) {
    pendingCalcData = {
      unclaimedValue: unclaimedValue,
      gap: unclaimedValue,
      foodSubtotal: orders.reduce(function(s,o){ return s+(o.subtotal||0); }, 0),
    };
    setHostSheet('mismatch');
    return;
  }
  doCalculate(false);
}

function doCalculate(hostAbsorbsUnclaimed) {
  var foodSubtotal = parseFloat(receiptData.subtotal) || 0;
  var tax       = parseFloat(receiptData.tax)        || 0;
  var service   = parseFloat(receiptData.serviceFee) || 0;
  var tip       = parseFloat(receiptData.tip)        || 0;
  var customs   = (receiptData.fees || []);
  var customsSum = customs.reduce(function(s,c){ return s + (parseFloat(c.amount)||0); }, 0);
  var grandTotal = foodSubtotal + tax + service + tip + customsSum;
  var hostName = (currentDinner && currentDinner.hostName) || '';

  // Unclaimed value: items with no claimer (shared items with no sharedBy count as unclaimed too)
  var unclaimedValue = 0;
  if (menuItems && menuItems.length > 0) {
    unclaimedValue = menuItems
      .filter(function(m) {
        if (m.shared) return !m.sharedBy || m.sharedBy.length === 0;
        return !m.claimedBy;
      })
      .reduce(function(s,m){ return s + (parseFloat(m.price)||0); }, 0);
  } else {
    var ordersFood = orders.reduce(function(s,o){ return s+(o.subtotal||0); }, 0);
    unclaimedValue = Math.max(0, Math.round((foodSubtotal - ordersFood) * 100) / 100);
  }

  // Allocations: start from each eater's claimed food. Distribute unclaimed.
  var allocs = orders.map(function(o) {
    return { name: o.name, isHost: !!o.isHost, base: o.subtotal || 0, food: o.subtotal || 0 };
  });

  // When menuItems exist, recalculate per-person food directly from item claims
  // so shared items are split correctly rather than relying on submitted subtotals.
  if (menuItems && menuItems.length > 0) {
    var foodByName = {};
    menuItems.forEach(function(m) {
      var price = parseFloat(m.price) || 0;
      if (m.shared && m.sharedBy && m.sharedBy.length > 0) {
        var share = price / m.sharedBy.length;
        m.sharedBy.forEach(function(n) {
          foodByName[n] = (foodByName[n] || 0) + share;
        });
      } else if (!m.shared && m.claimedBy) {
        foodByName[m.claimedBy] = (foodByName[m.claimedBy] || 0) + price;
      }
    });
    allocs.forEach(function(a) {
      a.food = round2(foodByName[a.name] || 0);
      a.base = a.food;
    });
  }
  if (unclaimedValue > 0.005) {
    if (hostAbsorbsUnclaimed) {
      var h = allocs.find(function(a){ return a.isHost; });
      if (h) {
        h.food += unclaimedValue;
      } else if (hostName) {
        allocs.push({ name: hostName, isHost: true, base: 0, food: unclaimedValue, virtualHost: true });
      } else {
        // No host on the order list and no hostName — fall back to even split.
        var per = unclaimedValue / Math.max(1, allocs.length);
        allocs.forEach(function(a){ a.food += per; });
      }
    } else {
      var perHead = unclaimedValue / Math.max(1, allocs.length);
      allocs.forEach(function(a){ a.food += perHead; });
    }
  }

  var totalFood = allocs.reduce(function(s,a){ return s + a.food; }, 0);
  var n = allocs.length || 1;

  // First pass: raw owes per person (high precision)
  allocs.forEach(function(a) {
    var share = totalFood > 0 ? a.food / totalFood : 1 / n;
    a.share = share;
    a.taxShare     = tax     * share;
    a.serviceShare = service * share;
    a.tipShare     = tip     * share;
    a.feeShare = 0;
    customs.forEach(function(c) {
      var amt = parseFloat(c.amount) || 0;
      if (!amt) return;
      // Old shape compat: { split:'person', person } stays per-person; otherwise honour proportional flag.
      if (c.split === 'person' && c.person) {
        if (c.person === a.name) a.feeShare += amt;
      } else if (c.proportional || c.split === 'proportional') {
        a.feeShare += amt * share;
      } else {
        a.feeShare += amt / n;
      }
    });
    a.owesRaw = a.food + a.taxShare + a.serviceShare + a.tipShare + a.feeShare;
    a.owes = Math.round(a.owesRaw * 100) / 100;
  });

  // Penny reconciliation — top payer absorbs the residual so the sum is exact.
  var grandRounded = Math.round(grandTotal * 100) / 100;
  var sumOwes = allocs.reduce(function(s,a){ return s + a.owes; }, 0);
  var residual = Math.round((grandRounded - sumOwes) * 100) / 100;
  if (Math.abs(residual) >= 0.01 && allocs.length > 0) {
    var top = allocs.slice().sort(function(a,b){ return b.owes - a.owes; })[0];
    if (top) top.owes = Math.round((top.owes + residual) * 100) / 100;
  }

  lastResults = allocs.map(function(a) {
    return {
      name: a.name,
      subtotal: a.food,         // includes unclaimed share
      baseSubtotal: a.base,
      tax: a.taxShare,
      service: a.serviceShare,
      tip: a.tipShare,
      feeShare: a.feeShare,
      total: a.owes,            // penny-reconciled
      tipPct: 0,
      isHost: a.isHost,
      virtualHost: !!a.virtualHost,
    };
  });
  lastResults._grandTotal = grandRounded;
  totalsSent = false;
  setHostSheet('settle');
}

async function notifyEaters() {
  if (!lastResults || lastResults.length === 0) { showToast('Calculate the split first'); return; }
  var btn = document.getElementById('notify-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
  // Try to hold the screen on while we send. Without this, a host who taps
  // Send and immediately locks their phone risks our in-flight Promise.all
  // being killed mid-batch — leaving some eaters stuck on waiting.
  var wakeLock = null;
  if (navigator.wakeLock && navigator.wakeLock.request) {
    try { wakeLock = await navigator.wakeLock.request('screen'); console.log('[NOTIFY] wake lock acquired'); }
    catch (e) { console.warn('[NOTIFY] wake lock denied:', e); }
  }
  var updates = lastResults.filter(function(r) {
    var match = orders.find(function(o){ return o.name === r.name && o.isHost; });
    return !match;
  }).map(function(r) {
    return {
      name: r.name,
      final_owes: round2(r.total),
      tax_share: round2(r.tax),
      tip_share: round2(r.tip),
      tip_pct: r.tipPct || 0,
    };
  });
  try {
    console.log('[NOTIFY] sending totals to ' + updates.length + ' eater(s)');
    var results = await Promise.all(updates.map(function(u) {
      return supabase.from('orders').update({
        final_owes: u.final_owes, tax_share: u.tax_share,
        tip_share: u.tip_share, tip_pct: u.tip_pct,
      }).eq('dinner_id', sessionId).eq('eater_name', u.name);
    }));
    var firstError = results.find(function(r){ return r.error; });
    if (firstError) throw firstError.error;
    totalsSent = true;
    console.log('[NOTIFY] all ' + updates.length + ' sent ok');
    showToast('Totals sent ✨');
    renderHostSettleSheet();
  } catch (e) {
    console.error('[NOTIFY] failed:', e);
    if (btn) { btn.disabled = false; btn.textContent = 'Send totals to eaters →'; }
    var em = (e && (e.message || e.hint || e.details)) || 'try again';
    showToast("Couldn't send totals — " + em + ". We'll retry when your phone wakes up.");
  } finally {
    if (wakeLock) {
      try { await wakeLock.release(); console.log('[NOTIFY] wake lock released'); } catch (e) {}
    }
  }
}

// Visibility-resume self-heal: when the host's tab comes back foreground
// after totals were sent, double-check whether every non-host eater actually
// has final_owes on the server and silently re-fire the update for any
// stragglers. Catches the "host locked phone mid-send" failure mode.
async function retryMissingFinalOwes() {
  if (!lastResults || !lastResults.length || !sessionId) return;
  try {
    var fresh = await fetchOrdersForDinner(sessionId);
    var freshByName = {};
    fresh.forEach(function(o){ freshByName[o.name] = o; });
    var missing = lastResults.filter(function(r) {
      if (r.isHost) return false;
      var serverRow = freshByName[r.name];
      return serverRow && serverRow.finalOwes == null;
    });
    if (missing.length === 0) return;
    console.warn('[NOTIFY RETRY] ' + missing.length + ' eater(s) still missing finalOwes — re-firing');
    var results = await Promise.all(missing.map(function(r) {
      return supabase.from('orders').update({
        final_owes:  round2(r.total),
        tax_share:   round2(r.tax),
        tip_share:   round2(r.tip),
        tip_pct:     r.tipPct || 0,
      }).eq('dinner_id', sessionId).eq('eater_name', r.name);
    }));
    var firstError = results.find(function(r){ return r.error; });
    if (firstError) {
      console.error('[NOTIFY RETRY] first error:', firstError.error);
      showToast('Some totals didn\'t resend — tap "Send totals" again');
      return;
    }
    showToast('Re-sent totals for ' + missing.length + ' eater' + (missing.length === 1 ? '' : 's') + ' ✨');
  } catch (e) {
    console.error('[NOTIFY RETRY] threw:', e);
  }
}

async function fetchEaterOrder(name) {
  var res = await supabase.from('orders')
    .select('id, subtotal, final_owes, tax_share, tip_share, tip_pct, order_items(name, price)')
    .eq('dinner_id', sessionId).eq('eater_name', name).maybeSingle();
  if (res.error || !res.data) return null;
  var d = res.data;
  return {
    items: (d.order_items || []).map(function(i){ return { name: i.name, price: parseFloat(i.price) }; }),
    subtotal: parseFloat(d.subtotal) || 0,
    finalOwes: d.final_owes != null ? parseFloat(d.final_owes) : undefined,
    taxShare: d.tax_share != null ? parseFloat(d.tax_share) : undefined,
    tipShare: d.tip_share != null ? parseFloat(d.tip_share) : undefined,
    tipPct: d.tip_pct != null ? parseFloat(d.tip_pct) : undefined,
  };
}

async function showEaterView() {
  stopTicker();
  await removeChannelSafe(dinnerChannel); dinnerChannel = null;
  await removeChannelSafe(dashboardChannel); dashboardChannel = null;
  await removeChannelSafe(eaterChannel); eaterChannel = null;
  eaterFirstRender = true;
  eaterCtx = {};
  // Reset the join-cache so a returning eater (or one opening a different
  // dinner in the same tab) doesn't have their bare name short-circuit
  // join_dinner against a prior dinner's cached entry.
  _eaterJoinedNames = {};
  document.getElementById('app').innerHTML =
    '<div class="tab-app tab-fade-in"><div style="padding:80px 24px;text-align:center;color:'+T.inkSoft+';">Loading the tab…</div></div>';
  var raw = await fetchDinnerRaw(sessionId);
  if (!raw) {
    document.getElementById('app').innerHTML =
      '<div class="tab-app tab-fade-in"><div style="padding:80px 24px;text-align:center;color:'+T.tomato+';font-weight:600;">Tab not found. Ask your host for the link.</div></div>';
    return;
  }
  var dinner = normalizeDinner(raw);
  currentDinner = dinner;
  menuItems = dinner.menuItems || [];
  receiptData = dinner.receiptData;
  // Load this dinner's orders for social-proof + ticker
  orders = await fetchOrdersForDinner(sessionId);

  var savedName = localStorage.getItem('eater-name-' + sessionId);
  eaterCtx = { dinner: dinner, selectedIndices: [] };
  if (savedName) {
    console.log('[EATER VIEW] returning eater "' + savedName + '" — resolving stage');
    // Backstop: fire join_dinner idempotently even on return visits.
    eaterJoinIfNeeded(savedName);
    var existing = await fetchEaterOrder(savedName);
    if (existing && existing.finalOwes != null) {
      console.log('[EATER VIEW] order with finalOwes → settled');
      eaterCtx.name = savedName;
      eaterCtx.order = existing;
      setEaterStage('settled');
      return;
    }
    if (existing) {
      console.log('[EATER VIEW] order without finalOwes → waiting');
      eaterCtx.name = savedName;
      eaterCtx.order = existing;
      setEaterStage('waiting');
      return;
    }
    // No order yet — fetch participants to disambiguate "joined-only" vs
    // "marked-picked-but-no-order" (which would be a bug worth knowing about).
    var parts = await fetchParticipants(sessionId);
    var part = (parts || []).find(function(p){ return p.name === savedName; });
    if (part && part.has_picked) {
      console.warn('[EATER VIEW] participant.has_picked is true but no order row found for "' + savedName + '" — likely a stale mark_picked. Falling back to claiming.');
    } else if (part) {
      console.log('[EATER VIEW] participant joined, no order → claiming');
    } else {
      console.log('[EATER VIEW] no participant row, but savedName present → claiming');
    }
    eaterCtx.prefillName = savedName;
    eaterCtx.name = savedName;
    if (menuItems && menuItems.length > 0) {
      menuItems.forEach(function(m, i) { if (m.claimedBy === savedName) eaterCtx.selectedIndices.push(i); });
    }
    setEaterStage('claiming');
    return;
  }
  // First visit: gate behind an explicit Join action
  console.log('[EATER VIEW] no savedName → join gate');
  setEaterStage('join');
}

// Track names we've already registered this session so we don't spam join_dinner
var _eaterJoinedNames = {};
function eaterJoinIfNeeded(name) {
  var n = (name || '').trim();
  if (!n || _eaterJoinedNames[n]) return;
  _eaterJoinedNames[n] = true;
  // Supabase v2 query builder returns a thenable, NOT a real Promise — it
  // exposes .then() but not .catch(). Use two-arg .then(onOk, onErr) for
  // fire-and-forget error handling. The previous .catch() blew up with
  // "supabase.rpc(...).catch is not a function" and hung showEaterView
  // for every returning eater.
  supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: n }).then(function(res) {
    if (res && res.error) {
      console.warn('[eaterJoinIfNeeded] join_dinner error:', res.error);
      delete _eaterJoinedNames[n];
    }
  }, function(err) {
    console.warn('[eaterJoinIfNeeded] join_dinner threw:', err);
    delete _eaterJoinedNames[n];
  });
}

async function joinTheTable() {
  var nameEl = document.getElementById('join-name');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('Enter your name first'); return; }
  var btn = document.querySelector('.tab-app .tab-grad-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Joining…'; }
  // Explicit join. This is the canonical signal — no onblur, no implicit fire.
  try {
    var res = await supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: name });
    if (res && res.error) console.warn('join_dinner error:', res.error);
  } catch (e) { console.warn('join_dinner threw:', e); }
  _eaterJoinedNames[name] = true;
  try {
    localStorage.setItem('eater-name-' + sessionId, name);
    localStorage.setItem('last-eater-session', sessionId);
  } catch (e) {}
  eaterCtx.name = name;
  eaterCtx.prefillName = name;
  eaterCtx.selectedIndices = [];
  if (menuItems && menuItems.length > 0) {
    menuItems.forEach(function(m, i) { if (m.claimedBy === name) eaterCtx.selectedIndices.push(i); });
  }
  setEaterStage('claiming');
}

function setEaterStage(stage) {
  var animate = !eaterFirstRender;
  eaterFirstRender = false;
  eaterStage = stage;
  // Stop the waiting-stage safety-net poll the moment we leave waiting
  if (stage !== 'waiting' && eaterPollTimer) {
    clearInterval(eaterPollTimer);
    eaterPollTimer = null;
  }
  renderEaterStage(animate);
}

function renderEaterStage(animate) {
  var d = eaterCtx.dinner;
  if (!d) return;
  if (eaterStage === 'join') { renderEaterJoinGate(); return; }
  scrollTopReset();

  // Hero choice: compact sticky strip for claiming, full gradient hero for
  // the more celebratory waiting / settled stages.
  var hero = (eaterStage === 'claiming')
    ? renderEaterCompactStrip()
    : renderEaterFullHero();

  var body = '', bottomBar = '';
  if (eaterStage === 'claiming') {
    body = renderEaterClaimingBody();
    bottomBar = renderEaterClaimingBar();
  } else if (eaterStage === 'waiting') {
    body = renderEaterWaitingBody();
  } else if (eaterStage === 'settled') {
    body = renderEaterSettledBody();
    bottomBar = renderEaterSettledBar();
  }

  var cls = 'tab-app ' + (animate ? 'tab-stage-enter' : 'tab-fade-in');
  document.getElementById('app').innerHTML =
    '<div class="' + cls + '" style="padding:0 0 200px;position:relative;">' +
      hero + body + bottomBar +
    '</div>';

  // Side effects
  if (eaterStage === 'claiming') {
    var hasMenu = (menuItems || []).length > 0;
    if (!hasMenu) {
      var pre = eaterCtx.prefillItems || [];
      if (pre.length > 0) pre.forEach(function(it){ addItem(it.name, it.price); });
      else addItem();
    }
    updateEaterRunningTotal();
  } else if (eaterStage === 'waiting') {
    setupEaterRealtime();
    // Fade the stuck-recovery button in after 20s of waiting so the eater
    // always has a manual escape hatch if realtime + poll both miss.
    setTimeout(function() {
      if (eaterStage !== 'waiting') return;
      var btn = document.getElementById('eater-stuck-btn');
      if (btn) btn.style.display = 'inline-flex';
    }, 20000);
  } else if (eaterStage === 'settled') {
    var appEl = document.querySelector('.tab-app');
    if (appEl) fireConfettiOnce(sessionId + '-' + (eaterCtx.name || ''), appEl);
  }
}

// Resolve the eater's name from the most reliable source first.
// In the compact-header layout the #guest-name input only exists when the
// eater opted into editing — so the DOM is NOT the source of truth.
function getEaterName() {
  var el = document.getElementById('guest-name');
  if (el) {
    var v = (el.value || '').trim();
    if (v) return v;
  }
  if (eaterCtx && eaterCtx.name) return String(eaterCtx.name).trim();
  if (eaterCtx && eaterCtx.prefillName) return String(eaterCtx.prefillName).trim();
  if (sessionId) {
    try {
      var stored = localStorage.getItem('eater-name-' + sessionId);
      if (stored) return String(stored).trim();
    } catch (e) {}
  }
  return '';
}

// auto-renames on collision so we never overwrite another diner.

async function saveEaterName() {
  var nameEl = document.getElementById('guest-name');
  var newName = nameEl ? nameEl.value.trim() : '';
  if (!newName) { showToast('Enter your name'); return; }
  var oldName = eaterCtx.name || '';
  if (newName === oldName) {
    eaterCtx.nameEditing = false;
    renderEaterStage(false);
    return;
  }
  var finalName = newName;
  try {
    var freshParts = await fetchParticipants(sessionId);
    var conflict = freshParts.find(function(p) {
      return p.name && p.name.toLowerCase() === finalName.toLowerCase() && p.name !== oldName;
    });
    if (conflict) {
      var counter = 2;
      while (freshParts.find(function(p) {
        return p.name && p.name.toLowerCase() === (newName + ' ' + counter).toLowerCase();
      })) { counter++; }
      finalName = newName + ' ' + counter;
      showToast('That name’s taken — using “' + finalName + '” instead');
    }
  } catch (e) { console.warn('[EATER NAME] participant fetch failed:', e); }
  try {
    var rj = await supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: finalName });
    if (rj && rj.error) console.warn('[EATER NAME] join_dinner error:', rj.error);
  } catch (e) { console.warn('[EATER NAME] join_dinner threw:', e); }
  _eaterJoinedNames[finalName] = true;
  try {
    localStorage.setItem('eater-name-' + sessionId, finalName);
    localStorage.setItem('last-eater-session', sessionId);
  } catch (e) {}
  eaterCtx.name = finalName;
  eaterCtx.prefillName = finalName;
  eaterCtx.nameEditing = false;
  // Re-derive selectedIndices from any items already claimed under the new name
  eaterCtx.selectedIndices = [];
  (menuItems || []).forEach(function(m, i) { if (m.claimedBy === finalName) eaterCtx.selectedIndices.push(i); });
  renderEaterStage(false);
}

function toggleEaterClaim(el) {
  var idx = parseInt(el.dataset.idx);
  if (!eaterCtx.selectedIndices) eaterCtx.selectedIndices = [];
  var pos = eaterCtx.selectedIndices.indexOf(idx);
  var rightDiv = el.lastElementChild;
  if (pos >= 0) {
    eaterCtx.selectedIndices.splice(pos, 1);
    el.classList.remove('is-mine');
    var p = rightDiv && rightDiv.querySelector('.eater-you-pill');
    if (p) p.remove();
  } else {
    eaterCtx.selectedIndices.push(idx);
    el.classList.add('is-mine');
    if (rightDiv && !rightDiv.querySelector('.eater-you-pill')) {
      var pill = document.createElement('div');
      pill.className = 'eater-you-pill';
      pill.style.cssText = 'font-size:10px;font-weight:700;color:'+T.tomato+';margin-top:2px;letter-spacing:0.4px;';
      pill.textContent = 'YOU';
      rightDiv.appendChild(pill);
    }
  }
  updateEaterRunningTotal();
  // Update bar enabled-state if count went 0↔non-zero
  var sendBtn = document.querySelector('.tab-sticky-bar .tab-grad-btn');
  if (sendBtn) sendBtn.disabled = (eaterCtx.selectedIndices.length === 0);

function computeEaterRunningTotal() {
  var hasMenu = (menuItems || []).length > 0;
  var sum = 0;
  if (hasMenu) {
    var myName = eaterCtx.name || eaterCtx.prefillName || '';
    (eaterCtx.selectedIndices || []).forEach(function(i) {
      var m = menuItems[i];
      if (!m) return;
      if (m.shared) {
        // Estimate my share: price divided by (current claimants + me if not already counted)
        var sb = m.sharedBy || [];
        var alreadyCounted = myName && sb.indexOf(myName) >= 0;
        var count = sb.length + (alreadyCounted ? 0 : 1);
        sum += (parseFloat(m.price) || 0) / Math.max(1, count);
      } else {
        sum += parseFloat(m.price) || 0;
      }
    });
  } else {
    document.querySelectorAll('#items-list .item-row').forEach(function(r) {
      sum += parseFloat(r.querySelector('.item-price').value) || 0;
    });
  }
  if (receiptData && receiptData.confirmed && receiptData.subtotal) {
    var prop = sum / receiptData.subtotal;
    sum += prop * (receiptData.tax || 0);
    sum += prop * (receiptData.tip || 0);
  }
  return sum;
}

function updateEaterRunningTotal() {
  var el = document.getElementById('eater-running');
  if (el) el.innerHTML = moneyHTML(computeEaterRunningTotal(), { color: T.cream });
}

async function submitEaterOrder() {
  console.log('[EATER SUBMIT] start');
  // The #guest-name input is only mounted while the eater is editing their
  // name in the compact-header layout. Fall back to the durable sources
  // (module state → localStorage) so the typical "just tap Send picks"
  // path works without any DOM input present.
  var name = getEaterName();
  if (!name) { showToast('Drop your name first'); return; }
  var hasMenu = (menuItems || []).length > 0;
  var items = []; var subtotal = 0;
  var indices = (eaterCtx.selectedIndices || []).slice();
  if (hasMenu) {
    if (indices.length === 0) { showToast('Tap at least one item'); return; }
    indices.forEach(function(i) {
      var m = menuItems[i];
      if (!m) return;
      items.push({ name: m.name, price: parseFloat(m.price) || 0 });
      subtotal += parseFloat(m.price) || 0;
    });
  } else {
    document.querySelectorAll('#items-list .item-row').forEach(function(r) {
      var n = r.querySelector('.item-name').value.trim();
      var p = parseFloat(r.querySelector('.item-price').value) || 0;
      if (n || p) { items.push({ name: n || 'Item', price: p }); subtotal += p; }
    });
    if (items.length === 0) { showToast('Add at least one item'); return; }
  }
  console.log('[EATER SUBMIT] calling upsert_order_with_items with', items.length, 'items for "' + name + '"');

  var sendBtn = document.querySelector('.tab-sticky-bar .tab-grad-btn');
  var resetSendBtn = function() {
    if (!sendBtn) return;
    sendBtn.disabled = false;
    sendBtn.innerHTML = 'Send picks' +
      ' <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;"><path d="M5 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
  };
  if (sendBtn) {
    sendBtn.disabled = true;
    sendBtn.innerHTML =
      '<span style="display:inline-flex;align-items:center;gap:8px;">' +
        '<span style="width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></span>' +
        'Locking in… 🔒' +
      '</span>';
  }

  try {
    // 1) Make sure the participant row exists. Idempotent, but if it fails
    //    that's still a strong diagnostic — log loudly, don't abort the order.
    try {
      var rj = await supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: name });
      if (rj && rj.error) console.error('[EATER SUBMIT] join_dinner error:', rj.error);
      else console.log('[EATER SUBMIT] join_dinner ok');
    } catch (e) { console.error('[EATER SUBMIT] join_dinner threw:', e); }

    // 2) The actual order write. If this fails, everything stops.
    var r1 = await supabase.rpc('upsert_order_with_items', {
      p_dinner_id: sessionId, p_eater_name: name,
      p_subtotal: round2(subtotal), p_is_host: false, p_items: items,
    });
    if (r1 && r1.error) {
      console.error('[EATER SUBMIT] upsert_order_with_items failed:', r1.error);
      throw r1.error;
    }
    console.log('[EATER SUBMIT] upsert success, returned:', r1 && r1.data);

    // 3) Pin the claimed indices on the dinner.menu_items[].claimedBy
    if (hasMenu) {
      var r2 = await supabase.rpc('claim_menu_items', {
        p_dinner_id: sessionId, p_eater_name: name, p_indices: indices,
      });
      if (r2 && r2.error) {
        console.error('[EATER SUBMIT] claim_menu_items failed:', r2.error);
        throw r2.error;
      }
      console.log('[EATER SUBMIT] claim_menu_items ok');
    }

    // 4) Best-effort: flip participant.has_picked → true. The eater
    //    picking their own items is byHost=false. Don't block the UI on it.
    markPickedWithLog(name, false, { tag: 'mark_picked EATER SUBMIT', silent: true });

    // 5) Persist locally so refresh routes to waiting.
    try {
      localStorage.setItem('eater-name-' + sessionId, name);
      localStorage.setItem('last-eater-session', sessionId);
    } catch (e) { console.warn('[EATER SUBMIT] localStorage write failed:', e); }

    // 6) Stage transition — DON'T wait on social-proof refetch. We have the
    //    items + subtotal in memory; render waiting immediately.
    eaterCtx.name = name;
    eaterCtx.order = { items: items, subtotal: subtotal };
    console.log('[EATER SUBMIT] transitioning to waiting');
    setEaterStage('waiting');

    // 7) Background refresh for the settled-stage social proof later.
    fetchOrdersForDinner(sessionId)
      .then(function(o) { orders = o; })
      .catch(function(e) { console.warn('[EATER SUBMIT] post-submit orders refresh failed:', e); });
  } catch (e) {
    console.error('[EATER SUBMIT] failed:', e);
    resetSendBtn();
    var msg = (e && (e.message || e.hint || e.details)) || 'Try again in a moment.';
    showToast("Couldn't save your picks — " + msg);
  }
}

function setupEaterRealtime() {
  removeChannelSafe(eaterChannel);
  var name = eaterCtx.name;
  if (!name) return;
  var sidAtSetup = sessionId;
  var nameAtSetup = name;
  eaterSubscribeTs = Date.now();
  var channelName = 'eater-' + sidAtSetup + '-' + nameAtSetup;
  var ch = supabase
    .channel(channelName)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'orders',
      filter: 'dinner_id=eq.' + sidAtSetup,
    }, async function(payload) {
      if (payload && payload.new && payload.new.eater_name === nameAtSetup && payload.new.final_owes != null) {
        await removeChannelSafe(eaterChannel); eaterChannel = null;
        if (eaterPollTimer) { clearInterval(eaterPollTimer); eaterPollTimer = null; }
        var order = await fetchEaterOrder(nameAtSetup);
        if (order) {
          orders = await fetchOrdersForDinner(sidAtSetup);
          eaterCtx.order = order;
          setEaterStage('settled');
        }
      }
    })
    .subscribe(function(status, err) {
      console.log('[realtime] ' + channelName + ' status:', status, err || '');
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        if (!ch._retried) {
          ch._retried = true;
          setTimeout(function() {
            // Only retry if we're still waiting on the same dinner/name.
            // The visibility-resume listener + 8s poll cover any further drops.
            if (eaterStage === 'waiting' && eaterCtx.name === nameAtSetup && sessionId === sidAtSetup) {
              console.log('[realtime] retrying ' + channelName);
              setupEaterRealtime();
            }
          }, 1500);
        }
      }
    });
  eaterChannel = ch;
  // Always-on poll as a safety net for silent realtime drops (especially
  // common after phone wake / network handoff). 8s cadence — short enough to
  // feel snappy, gentle enough on the orders table.
  if (eaterPollTimer) { clearInterval(eaterPollTimer); eaterPollTimer = null; }
  eaterPollTimer = setInterval(function() {
    if (eaterStage !== 'waiting') {
      clearInterval(eaterPollTimer); eaterPollTimer = null;
      return;
    }
    fetchEaterOrder(name).then(function(order) {
      if (order && order.finalOwes != null) {
        clearInterval(eaterPollTimer); eaterPollTimer = null;
        removeChannelSafe(eaterChannel); eaterChannel = null;
        eaterCtx.order = order;
        setEaterStage('settled');
      }
    }).catch(function() {});
  }, 8000);
}

// Eater-side manual recovery — surfaced as the "Stuck? Tap to refresh"
// button that fades in after 20s on the waiting screen.
async function eaterManualRefresh() {
  var name = (eaterCtx && eaterCtx.name) || '';
  if (!name) return;
  var btn = document.getElementById('eater-stuck-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Checking…'; }
  try {
    var order = await fetchEaterOrder(name);
    if (order && order.finalOwes != null) {
      if (eaterPollTimer) { clearInterval(eaterPollTimer); eaterPollTimer = null; }
      await removeChannelSafe(eaterChannel); eaterChannel = null;
      eaterCtx.order = order;
      setEaterStage('settled');
      return;
    }
    setupEaterRealtime(); // re-arm in case the websocket died
    if (btn) { btn.disabled = false; btn.textContent = 'Still waiting — try again'; }
  } catch (e) {
    console.error('[EATER STUCK] manual refresh failed:', e);
    if (btn) { btn.disabled = false; btn.textContent = 'Try again'; }
  }
}

function payViaZelle() {
  var amount = (eaterCtx.order && eaterCtx.order.finalOwes) || 0;
  var amt = amount.toFixed(2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(amt).catch(function(){});
  }
  showToast('$' + amt + ' copied');
  setTimeout(function() { try { window.location.href = 'zelle://'; } catch (e) {} }, 100);
}

function payViaVenmo() {
  var d = eaterCtx.dinner;
  var amount = (eaterCtx.order && eaterCtx.order.finalOwes) || 0;
  var amt = amount.toFixed(2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(amt).catch(function(){});
  }
  showToast('$' + amt + ' copied');
  var handle = (d && d.payMethod === 'Venmo' && d.payHandle) ? d.payHandle.replace(/^@/, '') : '';
  var url = handle
    ? ('venmo://paycharge?txn=pay&recipients=' + encodeURIComponent(handle) + '&amount=' + amt)
    : 'venmo://';
  setTimeout(function() { try { window.location.href = url; } catch (e) {} }, 100);
}

async function editEaterOrder() {
  var name = eaterCtx.name || localStorage.getItem('eater-name-' + sessionId);
  if (!name) return;
  var hasMenu = (menuItems || []).length > 0;
  if (hasMenu) {
    eaterCtx.selectedIndices = [];
    menuItems.forEach(function(m, i) { if (m.claimedBy === name) eaterCtx.selectedIndices.push(i); });
    eaterCtx.prefillItems = null;
  } else {
    var order = await fetchEaterOrder(name);
    eaterCtx.prefillItems = order ? order.items : [];
  }
  eaterCtx.name = name;
  setEaterStage('claiming');
}
