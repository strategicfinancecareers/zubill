<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFF4E8">
<title>Zubill — Open a tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Outfit (body) — swap, with a preconnect above to cut the FOUT short -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap">
<!-- Fraunces (italic accent only) — optional, so it never causes a layout shift; falls back to system serif if not loaded fast -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=optional">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFF4E8;
  color: #2A1610;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  /* Outfit's x-height ratio; with the system fallback we get near-identical metrics → no jump when Outfit lands */
  font-size-adjust: 0.514;
  /* Sticky 60-ish-px progress bar means anchor scrolls need padding so content doesn't tuck under it */
  scroll-padding-top: 60px;
}
button { font: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
input:focus, select:focus, textarea:focus { outline: none; }
.tab-tnum { font-variant-numeric: tabular-nums; }
.tab-app { max-width: 520px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 140px; }
.tab-input {
  width: 100%; padding: 13px 15px;
  background: #FFF8EE; color: #2A1610;
  border: 1.5px solid rgba(42,22,16,0.12);
  border-radius: 14px; font-size: 15px; font-weight: 500;
  font-family: 'Outfit', system-ui, sans-serif;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.tab-input:focus { border-color: #E54B3C; background: #fff; }
.tab-input[readonly] { background: #FFEAD2; color: #6B4F40; }
.tab-input::placeholder { color: #A08573; }
.tab-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: #6B4F40; margin-bottom: 6px;
}
.tab-card {
  background: #fff; border-radius: 22px; padding: 18px;
  box-shadow: 0 1px 0 rgba(42,22,16,0.05), 0 12px 24px -20px rgba(42,22,16,0.15);
}
.tab-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; padding: 4px 9px; border-radius: 999px;
}
.tab-iconbtn {
  width: 38px; height: 38px; border-radius: 999px;
  border: 1.5px solid rgba(42,22,16,0.10);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  color: #2A1610; flex-shrink: 0;
}
.tab-iconbtn:active { transform: scale(0.96); }
.tab-fab {
  background: #2A1610; color: #FFF4E8;
  border: none; border-radius: 999px;
  padding: 15px 26px; font-size: 15px; font-weight: 600;
  letter-spacing: -0.1px;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 20px 40px -12px rgba(42,22,16,0.45), 0 0 0 6px rgba(255,244,232,0.7);
}
.tab-fab:active { transform: translateY(1px); }
.tab-grad-btn {
  background: linear-gradient(135deg, #FF8B6D, #E54B3C);
  color: #fff; border: none; border-radius: 999px;
  padding: 14px 22px; font-size: 14.5px; font-weight: 700;
  letter-spacing: -0.1px;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 20px -6px rgba(229,75,60,0.55);
}
.tab-grad-btn:disabled { background: rgba(42,22,16,0.18); color: rgba(255,244,232,0.55); box-shadow: none; }
.tab-outline-btn {
  background: transparent; color: #2A1610;
  border: 1.5px solid rgba(42,22,16,0.18);
  border-radius: 999px; padding: 12px 18px; font-size: 14px; font-weight: 600;
}
.tab-ghost-btn {
  background: transparent; border: none; color: #E54B3C;
  font-size: 13px; font-weight: 600; padding: 6px 10px;
}
.tab-item-row {
  background: #fff; border-radius: 20px; padding: 12px 14px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 1px 0 rgba(42,22,16,0.05);
  cursor: pointer;
  transition: box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
}
.tab-item-row.is-mine {
  background: #FFF8F0;
  box-shadow: inset 0 0 0 2px #E54B3C, 0 10px 24px -16px rgba(229,75,60,0.4);
  transform: translateY(-1px);
}
.tab-item-row.is-locked { cursor: default; }
.tab-emoji-chip {
  width: 48px; height: 48px; border-radius: 14px;
  background: #FFE7D1;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
  transition: background 0.25s ease;
}
.tab-item-row.is-mine .tab-emoji-chip {
  background: linear-gradient(135deg, #FFD6B0, #FF8B6D);
}
.tab-sticky-bar {
  position: fixed; bottom: 22px; left: 16px; right: 16px;
  max-width: 488px; margin: 0 auto;
  background: #2A1610; color: #FFF4E8;
  border-radius: 22px; padding: 14px 18px;
  box-shadow: 0 22px 48px -16px rgba(42,22,16,0.55), 0 0 0 6px rgba(255,244,232,0.8);
  z-index: 20;
}
.tab-stage-enter { animation: stageSwap 280ms cubic-bezier(0.2, 0.7, 0.2, 1) both; }
.tab-fade-in { animation: tabFadeIn 220ms ease-out both; }
@keyframes stageSwap { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes tabFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes tabPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
@keyframes tickerSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes tabSpin { to { transform: rotate(360deg); } }
@keyframes tabBob { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-6px) rotate(6deg); } }
@keyframes confettiFall {
  0% { opacity: 0; transform: translate3d(0,-20px,0) rotate(0); }
  12% { opacity: 1; }
  100% { opacity: 0; transform: translate3d(var(--drift), 720px, 0) rotate(720deg); }
}
@keyframes spin { to { transform: rotate(360deg); } }
.tab-toast {
  position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
  background: #2A1610; color: #FFF4E8; padding: 10px 16px;
  border-radius: 999px; font-size: 13px; font-weight: 600;
  box-shadow: 0 20px 40px -12px rgba(42,22,16,0.45);
  z-index: 60; animation: tabFadeIn 180ms ease-out;
}
</style>
</head>

<script type="module">

var params = new URLSearchParams(window.location.search);

// ── Tiny utilities ───────────────────────────────────────────────────────
function round2(n) { return Math.round(n * 100) / 100; }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]
  ));
}
function attr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
function userDisplay(u) {
  if (!u) return '';
  var meta = u.user_metadata || {};
  return meta.full_name || meta.name || u.email || '';
}
function userFirstName(u) {
  var n = userDisplay(u);
  if (!n) return 'there';
  return n.split(/[\s@]/)[0] || 'there';
}
function formatDate(d) {
  if (!d) return '';
  var parts = String(d).split('-');
  if (parts.length < 3) return d;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]);
}
function dayOfWeek(d) {
  if (!d) return 'Tonight';
  try {
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    return days[new Date(d + 'T12:00:00').getDay()] || 'Tonight';
  } catch (e) { return 'Tonight'; }
}
function whenLabel(createdAt, date) {
  if (createdAt) {
    var diff = Date.now() - new Date(createdAt).getTime();
    if (diff < 12 * 3600 * 1000) return 'Tonight';
    if (diff < 36 * 3600 * 1000) return 'Yesterday';
  }
  return formatDate(date);
}
function normalizeDinner(d) {
  if (!d) return null;
  var rd = d.receipt_data || { subtotal: 0, tax: 0, tip: 0, fees: [], confirmed: false };
  // Fill new fields for older rows so the UI never sees `undefined`
  if (rd.serviceFee   == null) rd.serviceFee   = 0;
  if (rd.receiptTotal == null) rd.receiptTotal = 0;
  if (!Array.isArray(rd.fees)) rd.fees = [];
  return {
    id: d.id,
    restaurant: d.restaurant,
    name: d.name,
    date: d.date,
    hostName: d.host_name,
    payMethod: d.pay_method,
    payHandle: d.pay_handle,
    menuItems: d.menu_items || [],
    receiptData: rd,
    orderCount: d.order_count || 0,
    createdAt: d.created_at,
  };
}
function normalizeOrder(o) {
  return {
    name: o.eater_name,
    items: (o.order_items || []).map(i => ({ name: i.name, price: parseFloat(i.price) })),
    subtotal: parseFloat(o.subtotal) || 0,
    isHost: !!o.is_host,
    finalOwes: o.final_owes != null ? parseFloat(o.final_owes) : undefined,
    taxShare: o.tax_share != null ? parseFloat(o.tax_share) : undefined,
    tipShare: o.tip_share != null ? parseFloat(o.tip_share) : undefined,
    tipPct: o.tip_pct != null ? parseFloat(o.tip_pct) : undefined,
    submittedAt: o.submitted_at,
  };
}
async function fetchDinnerRaw(id) {
  var res = await supabase.from('dinners').select('*').eq('id', id).maybeSingle();
  if (res.error) { console.error(res.error); return null; }
  return res.data;
}
async function fetchOrdersForDinner(id) {
  try {
    var res = await supabase
      .from('orders')
      .select('id, eater_name, subtotal, is_host, submitted_at, final_owes, tax_share, tip_share, tip_pct, order_items(name, price)')
      .eq('dinner_id', id)
      .order('submitted_at', { ascending: true });
    if (res.error) { console.warn('fetchOrders error:', res.error); return []; }
    return (res.data || []).map(normalizeOrder);
  } catch (e) {
    console.warn('fetchOrders threw:', e);
    return [];
  }
}
// Centralised mark_picked caller — uses the 3-arg signature with named params
// (matches PostgREST's `mark_picked(p_dinner_id, p_name, p_picked_by_host)`),
// logs the FULL error object on failure, surfaces a non-fatal toast, and
// refreshes the local participants array on success so the joined/picked
// counter and pre-settle overlay never read stale state.
async function markPickedWithLog(name, byHost, opts) {
  opts = opts || {};
  var tag = opts.tag || 'mark_picked';
  var n = String(name || '').trim();
  if (!n) { console.warn('[' + tag + '] called with empty name — skipping'); return false; }
  try {
    var res = await supabase.rpc('mark_picked', {
      p_dinner_id: sessionId,
      p_name: n,
      p_picked_by_host: !!byHost,
    });
    if (res && res.error) {
      console.error('[' + tag + '] error for "' + n + '" byHost=' + !!byHost + ':', res.error);
      if (!opts.silent) showToast("Couldn't update pick status — refresh if you see issues");
      return false;
    }
    console.log('[' + tag + '] ok for "' + n + '" byHost=' + !!byHost);
    try {
      var fresh = await fetchParticipants(sessionId);
      if (Array.isArray(fresh)) participants = fresh;
    } catch (e) { console.warn('[' + tag + '] participants refresh failed:', e); }
    return true;
  } catch (e) {
    console.error('[' + tag + '] threw for "' + n + '":', e);
    if (!opts.silent) showToast("Couldn't update pick status — refresh if you see issues");
    return false;
  }
}

async function fetchParticipants(id) {
  try {
    var res = await supabase
      .from('participants')
      .select('id, name, joined_at, has_picked, picked_at, picked_by_host')
      .eq('dinner_id', id)
      .order('joined_at', { ascending: true });
    if (res.error) { console.warn('fetchParticipants error:', res.error); return []; }
    return res.data || [];
  } catch (e) {
    console.warn('fetchParticipants threw:', e);
    return [];
  }
}
async function removeChannelSafe(ch) {
  if (!ch) return;
  try { await supabase.removeChannel(ch); } catch (e) {}
}

// ── Design helpers ───────────────────────────────────────────────────────
function emojiForItem(name) {
  if (!name) return '🍽️';
  var n = String(name).toLowerCase();
  var rules = [
    [/limone|lemon/, '🍋'],
    [/oyster|vongole|clam|mussel|shellfish/, '🦪'],
    [/wagyu|steak|ribeye|filet|beef|tenderloin|short rib|brisket/, '🥩'],
    [/meatball/, '🍖'],
    [/tagliolini|rigatoni|linguine|spaghetti|carbonara|cacio|bolognese|alfredo|fettuccine|lasagna|pasta|gnocchi|ravioli/, '🍝'],
    [/martini|cocktail|negroni|aperol|spritz|manhattan|margarita|old fashioned|highball/, '🍸'],
    [/wine|tignanello|chardonnay|cabernet|merlot|pinot|sauvignon|rose|rosé|champagne|prosecco|barolo|chianti|bottle/, '🍷'],
    [/beer|ipa|lager|pilsner|stout/, '🍺'],
    [/tiramisu|cake|gelato|dessert|cannoli|crème|cheesecake|brulee|brûlée|sundae|cookie|brownie|panna cotta|sorbet/, '🍰'],
    [/coffee|espresso|cappuccino|latte|americano|macchiato/, '☕'],
    [/pizza|margherita|pepperoni|calzone/, '🍕'],
    [/burger|cheeseburger|smashburger/, '🍔'],
    [/fries|frites/, '🍟'],
    [/chicken|cutlet|piccata|milanese|parm/, '🍗'],
    [/salmon|tuna|branzino|sea bass|bass|cod|halibut|swordfish|fish/, '🐟'],
    [/salad|caesar|caprese|arugula|burrata|insalata/, '🥗'],
    [/soup|brodo|minestrone|bisque|stracciatella/, '🍲'],
    [/bread|focaccia|baguette/, '🥖'],
    [/taco|burrito|quesadilla/, '🌮'],
    [/sushi|sashimi|nigiri|maki|roll/, '🍣'],
    [/ramen|noodle|pho|udon/, '🍜'],
    [/egg|omelet|frittata/, '🍳'],
    [/shrimp|scampi|prawn|lobster/, '🍤'],
    [/duck|foie/, '🦆'],
    [/pork|prosciutto|guanciale|bacon/, '🥓'],
    [/risotto/, '🍚'],
    [/cheese|formaggio/, '🧀'],
  ];
  for (var i = 0; i < rules.length; i++) {
    if (rules[i][0].test(n)) return rules[i][1];
  }
  return '🍽️';
}
function avatarFor(name) {
  var palette = ['#B85656','#2E7D5B','#3F3A4F','#C9A86A','#7B7B6F','#9A6E54','#5C6F4B','#1F1A16'];
  var s = String(name || '').trim();
  var initial = (s[0] || '?').toUpperCase();
  var h = 0;
  for (var i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) | 0;
  return { initial: initial, tone: palette[Math.abs(h) % palette.length] };
}
function vibeForDinner(d) {
  var name = String((d && (d.name || d.restaurant)) || '').toLowerCase();
  if (name.indexOf('birthday') >= 0)       return { tag: '🎂 Birthday dinner', vibe: 'gold' };
  if (name.indexOf('girls') >= 0)          return { tag: '🍸 Girls Night',     vibe: 'cherry' };
  if (name.indexOf('boys') >= 0)           return { tag: '🥩 Boys dinner',     vibe: 'olive' };
  if (name.indexOf('anniversary') >= 0)    return { tag: '🥂 Anniversary',     vibe: 'cherry' };
  if (name.indexOf('pizza') >= 0)          return { tag: '🍕 Pizza Friday',    vibe: 'coral' };
  var day = dayOfWeek(d && d.date);
  var s = (d && (d.id || d.restaurant)) || '';
  var h = 0;
  for (var i = 0; i < String(s).length; i++) h = ((h * 31) + String(s).charCodeAt(i)) | 0;
  var vibes = ['tomato','coral','gold','olive','cherry'];
  return { tag: '🍝 ' + day + ' supper', vibe: vibes[Math.abs(h) % vibes.length] };
}
function avatarHTML(name, opts) {
  opts = opts || {};
  var size = opts.size || 28;
  var p = avatarFor(name);
  var ring = opts.ring;
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:999px;background:'+p.tone+
    ';color:#fff;display:flex;align-items:center;justify-content:center;font-family:'+T.sans+
    ';font-weight:600;font-size:'+(size*0.42).toFixed(1)+'px;letter-spacing:0.2px;flex-shrink:0;'+
    (ring ? 'box-shadow:0 0 0 2px '+ring+';' : '') + '">'+escapeHtml(p.initial)+'</div>';
}
function avatarStackHTML(names, opts) {
  opts = opts || {};
  var size = opts.size || 26;
  var max  = opts.max  || 4;
  var ring = opts.ring || T.cream;
  var shown = names.slice(0, max);
  var rest  = Math.max(0, names.length - shown.length);
  var html  = '<div style="display:inline-flex;align-items:center;">';
  for (var i = 0; i < shown.length; i++) {
    var margin = i === 0 ? 0 : -size*0.32;
    html += '<div style="margin-left:'+margin+'px;">' + avatarHTML(shown[i], { size: size, ring: ring }) + '</div>';
  }
  if (rest > 0) {
    html += '<div style="margin-left:'+(-size*0.32).toFixed(1)+'px;width:'+size+'px;height:'+size+

      ';display:flex;align-items:center;justify-content:center;font-family:'+T.sans+
      ';font-size:'+(size*0.38).toFixed(1)+'px;font-weight:600;box-shadow:0 0 0 2px '+T.cream+
      ', inset 0 0 0 1.5px '+T.ink+';">+'+rest+'</div>';
  }
  html += '</div>';
  return html;
}
function avatarHTMLWithCheck(name, opts) {
  opts = opts || {};
  var size = opts.size || 28;
  var picked = !!opts.picked;
  var pickedByHost = !!opts.pickedByHost;
  var ring = opts.ring || T.cream;
  var p = avatarFor(name);
  var dim = picked ? '' : 'opacity:0.55;';
  var html = '<div style="position:relative;display:inline-block;width:'+size+'px;height:'+size+'px;flex-shrink:0;" title="'+attr(name + (pickedByHost ? ' · picked by host' : ''))+'">' +

  if (picked) {

function participantsStackHTML(parts, opts) {

// ── Live activity ticker ─────────────────────────────────────────────────
function tickerLines() {
  var lines = [];
  orders.forEach(function(o) {
    (o.items || []).forEach(function(it) {
      var verbs = ['grabbed', 'claimed', 'snagged', 'is on'];
      var s = (o.name || '') + (it.name || '');
      var h = 0;
      for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
      var verb = verbs[Math.abs(h) % verbs.length];
      var connective = verb === 'is on' ? ' the ' : ' the ';
      lines.push({
        who: o.name,
        emoji: emojiForItem(it.name),
        text: verb + connective + it.name.toLowerCase(),
      });
    });
  });
  return lines;
}
function tickerHTML() {
  var joinedCount = participants.length;
  var pickedCount = participants.filter(function(p){ return p.has_picked; }).length;
  if (joinedCount === 0) {
    return '<div style="background:'+T.paper+';border-radius:18px;padding:14px 16px;border:1px solid '+T.rule+
      ';min-height:54px;box-sizing:border-box;display:flex;align-items:center;gap:12px;color:'+T.inkSoft+';font-size:13.5px;font-weight:500;">' +
      '<span style="font-size:20px;">👥</span>' +
      '<span>Nobody’s joined yet — share the link 📎</span>' +
    '</div>';
  }
  var lines = tickerLines();
  var hasTicker = lines.length > 0;
  return '<div id="tab-ticker" style="background:'+T.paper+';border-radius:18px;padding:12px 14px;border:1px solid '+T.rule+';min-height:54px;box-sizing:border-box;">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
      participantsStackHTML(participants, { size: 24, max: 5, ring: T.paper }) +
      '<div style="font-size:13.5px;font-weight:600;color:'+T.ink+';flex:1;min-width:0;line-height:1.25;">' +
        '<span style="color:'+T.ink+';">'+joinedCount+'</span>' +
        '<span style="color:'+T.inkSoft+';font-weight:500;"> joined · </span>' +
        '<span style="color:'+T.olive+';">'+pickedCount+'</span>' +
        '<span style="color:'+T.inkSoft+';font-weight:500;"> picked</span>' +
      '</div>' +
      '<span style="width:7px;height:7px;border-radius:999px;background:'+T.tomato+
      ';box-shadow:0 0 0 3px rgba(229,75,60,0.18);animation:tabPulse 1.6s ease-in-out infinite;flex-shrink:0;" aria-label="Live"></span>' +
    '</div>' +
    (hasTicker
      ? '<div style="height:1px;background:'+T.rule+';margin:10px 0 8px;"></div>' +
        '<div id="tab-ticker-content" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:'+T.inkSoft+';overflow:hidden;min-height:22px;"></div>'
      : '') +
  '</div>';
}
function stopTicker() {
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
}
function startTicker() {
  stopTicker();
  var lines = tickerLines();
  if (lines.length === 0) return;
  var idx = 0;
  var paint = function() {
    var content = document.getElementById('tab-ticker-content');
    if (!content) { stopTicker(); return; }
    var item = lines[idx % lines.length];
    content.innerHTML = '<div style="display:flex;align-items:center;gap:7px;animation:tickerSlide 0.45s ease-out;min-width:0;">' +
      avatarHTML(item.who, { size: 18 }) +
      '<div style="font-size:12.5px;font-weight:500;color:'+T.inkSoft+';line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
        '<strong style="font-weight:700;color:'+T.ink+';">'+escapeHtml(item.who)+'</strong> '+escapeHtml(item.text)+
        ' <span style="font-size:13px;">'+item.emoji+'</span>' +
      '</div>' +
    '</div>';

// ── Confetti (CSS particles) ─────────────────────────────────────────────
function fireConfettiOnce(key, container) {
  if (!container) return;
  try { if (sessionStorage.getItem('tab-confetti-' + key)) return; } catch (e) {}
  try { sessionStorage.setItem('tab-confetti-' + key, '1'); } catch (e) {}
  var colors = [T.tomato, T.coral, T.golden, T.olive, T.cherry];
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;';
  for (var i = 0; i < 28; i++) {
    var x = 6 + Math.random() * 88;
    var delay = Math.random() * 0.7;
    var dur = 1.6 + Math.random() * 1.2;
    var color = colors[i % colors.length];
    var rot = Math.random() * 360;
    var size = 6 + Math.random() * 6;
    var shape = Math.random() > 0.5 ? '50%' : '2px';
    var drift = (-30 + Math.random() * 60).toFixed(0);
    var s = document.createElement('span');
    s.style.cssText = 'position:absolute;top:-20px;left:'+x+'%;width:'+size+'px;height:'+size+
      'px;border-radius:'+shape+';background:'+color+
      ';transform:rotate('+rot+'deg);animation:confettiFall '+dur+'s '+delay+
      's cubic-bezier(0.45,0,0.55,1) forwards;opacity:0;--drift:'+drift+'px;';
    wrap.appendChild(s);
  }
  container.appendChild(wrap);
  setTimeout(function() { wrap.remove(); }, 3500);
}

// ── Toast ────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var existing = document.querySelector('.tab-toast');
  if (existing) existing.remove();
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  var el = document.createElement('div');
  el.className = 'tab-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  _toastTimer = setTimeout(function() { el.remove(); _toastTimer = null; }, 2000);
}

// ── Live-dinner detection on dashboard ───────────────────────────────────
function liveDinnerFromList(dinners) {
  var twelveHrsAgo = Date.now() - 12 * 3600 * 1000;
  for (var i = 0; i < dinners.length; i++) {
    var d = dinners[i];
    var t = d.created_at ? new Date(d.created_at).getTime() : 0;
    if (t < twelveHrsAgo) continue;
    if ((d.order_count || 0) === 0) return d;
    var ords = d.orders || [];
    if (ords.length === 0) return d;
    var anyOpen = false;
    for (var j = 0; j < ords.length; j++) {
      if (ords[j].final_owes == null) { anyOpen = true; break; }
    }
    if (anyOpen) return d;
  }
  return null;
}

// ── Linear host-journey progress bar (tappable + gated) ────────────────
function progressBarHTML(step) {
  var steps = [
    { key: 'scan',   label: 'Scan'   },
    { key: 'share',  label: 'Share'  },
    { key: 'settle', label: 'Settle' },
  ];
  var order = { scan: 0, share: 1, settle: 2 };
  var ci = order[step];
  if (ci == null) return '';
  // Gating
  var receiptOK = !!(receiptData && receiptData.confirmed);
  var anyPicks = participants.some(function(p){ return p.has_picked; }) || orders.length > 0;
  var enabled = { scan: true, share: receiptOK, settle: receiptOK && anyPicks };
  var html =
    '<div style="position:sticky;top:0;left:0;right:0;background:'+T.cream+
    ';z-index:30;padding:14px 22px 12px;border-bottom:1px solid '+T.ruleSoft+';">' +
      '<div style="display:flex;align-items:center;gap:4px;max-width:380px;margin:0 auto;">';
  steps.forEach(function(s, i) {
    var isActive = i === ci;
    var isDone   = i < ci;
    var isEnabled = enabled[s.key];
    var canTap = isEnabled && !isActive;
    var dotColor = isActive ? T.tomato : isDone ? T.olive : (isEnabled ? T.inkSoft : T.inkDim);
    var dotBg    = (isActive || isDone) ? dotColor : 'transparent';
    var contentColor = (isActive || isDone) ? '#fff' : dotColor;
    var dotContent = isDone ? '✓' : (i + 1);
    var labelColor = isActive ? T.tomato : isDone ? T.olive : (isEnabled ? T.inkSoft : T.inkDim);
    var opacity = isEnabled ? '1' : '0.55';
    var cursor  = canTap ? 'pointer' : (isActive ? 'default' : 'not-allowed');
    var tapAttr = canTap ? ' onclick="navigateToStep(\''+s.key+'\')"' : '';
    html +=
      '<div'+tapAttr+' role="button" aria-disabled="'+(!isEnabled)+'" style="display:flex;align-items:center;gap:7px;cursor:'+cursor+';opacity:'+opacity+';' +
        (i < 2 ? 'flex:1;' : 'flex-shrink:0;')+'-webkit-tap-highlight-color:transparent;">' +
        '<div style="width:22px;height:22px;border-radius:999px;border:1.5px solid '+dotColor+';background:'+dotBg+
          ';color:'+contentColor+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">' +
          dotContent +
        '</div>' +
        '<div style="font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+labelColor+';">' +
          s.label +
        '</div>' +
      '</div>' +
      (i < 2 ? '<div style="flex:1;height:2px;background:'+(isDone ? T.olive : T.rule)+';border-radius:999px;margin:0 4px;"></div>' : '');
  });
  html += '</div></div>';
  return html;
}

function navigateToStep(step) {
  if (step === 'scan')  return setHostSheet('scan');
  if (step === 'share') {
    if (!(receiptData && receiptData.confirmed)) { showToast('Confirm the receipt first'); return; }
    return setHostSheet('share');
  }
  if (step === 'settle') {
    if (!(receiptData && receiptData.confirmed)) { showToast('Confirm the receipt first'); return; }
    if (!(participants.some(function(p){ return p.has_picked; }) || orders.length > 0)) {
      showToast('Wait on the first pick');
      return;
    }
    return setHostSheet(null);
  }
}

function scrollTopReset() {
  try { window.scrollTo(0, 0); } catch (e) {}
  try { document.documentElement.scrollTop = 0; } catch (e) {}
  try { document.body.scrollTop = 0; } catch (e) {}
}

function matchBannerHTML() {
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  var tax = parseFloat(receiptData.tax) || 0;
  var service = parseFloat(receiptData.serviceFee) || 0;
  var tip = parseFloat(receiptData.tip) || 0;
  var customs = (receiptData.fees || []).reduce(function(s,f){ return s + (parseFloat(f.amount)||0); }, 0);
  var ourSum = sub + tax + service + tip + customs;
  var printed = parseFloat(receiptData.receiptTotal) || 0;
  if (!printed) {
    if (!sub && !tax && !service && !tip && !customs) return '';
    return '<div style="padding:12px 14px;background:'+T.paper+';border-radius:14px;font-size:12.5px;color:'+T.inkSoft+';font-weight:500;line-height:1.4;">Enter the receipt’s printed total above to reconcile.</div>';
  }
  var diff = ourSum - printed;
  var absDiff = Math.abs(diff);
  if (absDiff < 0.10) {
    return '<div style="padding:12px 14px;background:rgba(95,107,58,0.14);border-radius:14px;font-size:13px;color:'+T.olive+';font-weight:700;line-height:1.4;">✓ Adds up — start splitting</div>';
  }
  var dirText = diff > 0
    ? 'your lines total $'+ourSum.toFixed(2)+' but the receipt says $'+printed.toFixed(2)+' (your lines are $'+absDiff.toFixed(2)+' high)'
    : 'your lines total $'+ourSum.toFixed(2)+' but the receipt says $'+printed.toFixed(2)+' (your lines are $'+absDiff.toFixed(2)+' low)';
  return '<div style="padding:14px 16px;background:rgba(229,75,60,0.10);border:1.5px solid rgba(229,75,60,0.35);border-radius:14px;color:'+T.cherry+';line-height:1.4;">' +
    '<div style="font-size:14px;font-weight:800;letter-spacing:-0.2px;margin-bottom:6px;">Off by $'+absDiff.toFixed(2)+'</div>' +
    '<div style="font-size:12.5px;color:'+T.inkSoft+';font-weight:500;margin-bottom:10px;">'+dirText+'.</div>' +
    '<div style="font-size:11.5px;color:'+T.inkSoft+';font-weight:500;margin-bottom:10px;">Likely culprit: missed item, mis-read tax, hidden service charge, or a fee not added yet.</div>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
      '<button onclick="expandFoodAndScroll()" style="font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1.5px solid '+T.cherry+';background:#fff;color:'+T.cherry+';cursor:pointer;">Expand food</button>' +
      '<button onclick="focusField(\'r-tax\')" style="font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1.5px solid '+T.cherry+';background:#fff;color:'+T.cherry+';cursor:pointer;">Edit tax</button>' +
      '<button onclick="focusField(\'r-service\')" style="font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1.5px solid '+T.cherry+';background:#fff;color:'+T.cherry+';cursor:pointer;">Edit service</button>' +
      '<button onclick="addFee()" style="font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1.5px solid '+T.cherry+';background:#fff;color:'+T.cherry+';cursor:pointer;">Add charge</button>' +
    '</div>' +
  '</div>';
}

function refreshMatchBanner() {
  saveScanStateDebounced();
  var sub = (menuItems || []).reduce(function(s, m){ return s + (parseFloat(m.price)||0); }, 0);
  receiptData.subtotal = round2(sub);
  var subEl = document.getElementById('food-subtotal');
  if (subEl) subEl.innerHTML = moneyHTML(sub);
  var tax = parseFloat(receiptData.tax) || 0;
  var service = parseFloat(receiptData.serviceFee) || 0;
  var tip = parseFloat(receiptData.tip) || 0;
  var customs = (receiptData.fees || []).reduce(function(s,f){ return s + (parseFloat(f.amount)||0); }, 0);
  var ourSum = sub + tax + service + tip + customs;
  // Live-refresh the derived "Subtotal with tax" line
  var swt = document.getElementById('subtotal-with-tax');
  if (swt) swt.innerHTML = moneyHTML(sub + tax, { color: T.inkSoft });
  var ourSumEl = document.getElementById('our-sum-display');
  if (ourSumEl) ourSumEl.innerHTML = moneyHTML(ourSum);
  var bannerEl = document.getElementById('receipt-match-banner');
  if (bannerEl) bannerEl.innerHTML = matchBannerHTML();
  // Pills + live % equivalent track the same subtotal/tip state, so
  // re-evaluate them here too — covers $ keystroke AND menu-item edits.
  refreshTipUI();
}

function shareEaterLink() {
  var url = window.location.origin + window.location.pathname + '?mode=eater&session=' + sessionId;
  var rest = (currentDinner && currentDinner.restaurant) || 'dinner';
  var hostFirst = ((currentDinner && currentDinner.hostName) || 'Your friend').split(/\s+/)[0];
  if (navigator.share) {
    navigator.share({
      title: rest,
      text: hostFirst + ' sent you the bill — tap to claim what you ate 🍝',
      url: url,
    }).then(function() {
      // Auto-advance to the live claim view after a successful share
      if (hostSheet === 'share') setTimeout(function() { setHostSheet(null); }, 400);
    }).catch(function() {});
  } else {
    copyEaterLink();
    if (hostSheet === 'share') setTimeout(function() { setHostSheet(null); }, 600);
  }
}

      '<div style="font-size:12px;color:'+T.inkSoft+';margin-bottom:14px;font-weight:600;letter-spacing:0.2px;">' +
        'AirDrop the QR ↑ fastest 🏃' +
      '</div>' +
      '<button onclick="copyEaterLink()" class="tab-outline-btn" style="width:100%;">📎 Copy link</button>' +
      '<button onclick="dismissShareFallback()" class="tab-ghost-btn" style="margin-top:6px;width:100%;padding:10px;font-weight:600;color:'+T.inkSoft+';">Close</button>' +
    '</div>';
  document.body.appendChild(overlay);
  setTimeout(function() {
    var qrEl = document.getElementById('qr-popup');
    if (!qrEl) return;
    qrEl.innerHTML = '';
    if (window.QRCode) {
      try {
        new window.QRCode(qrEl, {
          text: url, width: 204, height: 204,
          colorDark: T.espresso, colorLight: T.cream,
          correctLevel: window.QRCode.CorrectLevel.M,
        });
      } catch (e) {
        qrEl.innerHTML = '<div style="font-size:12px;color:'+T.inkSoft+';">Couldn’t draw QR — use Copy link.</div>';
      }
    }
  }, 30);
}

function dismissShareFallback() {
  var els = document.querySelectorAll('.tab-share-fallback');
  els.forEach(function(el){ el.remove(); });
}

// ── "Pick for someone else" modal ───────────────────────────────────────
// Two-step overlay: (1) pick / add a participant, (2) pick their items.
// Marks the saved order with picked_by_host=true via the new mark_picked
// signature so the host can later see which picks they did on behalf of.
var pickForCtx = { stage: 'who', name: null, selectedIndices: [] };

function openPickForSomeoneElse() {
  pickForCtx = { stage: 'who', name: null, selectedIndices: [] };
  renderPickForModal();
}

function dismissPickForModal() {
  var els = document.querySelectorAll('.tab-pick-for');
  els.forEach(function(el){ el.remove(); });
  pickForCtx = { stage: 'who', name: null, selectedIndices: [] };
}

function renderPickForModal() {
  dismissPickForModal.__skipReset = true; // dismiss any prior without nuking ctx
  var prior = document.querySelectorAll('.tab-pick-for');
  prior.forEach(function(el){ el.remove(); });
  dismissPickForModal.__skipReset = false;

  var overlay = document.createElement('div');
  overlay.className = 'tab-pick-for tab-modal-overlay';
  overlay.style.cssText =
    'position:fixed;inset:0;background:rgba(42,22,16,0.55);z-index:200;' +
    'display:flex;align-items:flex-end;justify-content:center;padding:14px;' +
    'animation:tabFadeIn 180ms ease-out;';
  overlay.onclick = function(e) { if (e.target === overlay) dismissPickForModal(); };

  var inner;
  if (pickForCtx.stage === 'who') inner = pickForWhoSheetHTML();
  else                            inner = pickForItemsSheetHTML();

  overlay.innerHTML =
    '<div role="dialog" aria-modal="true" style="background:#fff;border-radius:24px 24px 18px 18px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -24px 48px -16px rgba(42,22,16,0.45);animation:stageSwap 240ms cubic-bezier(0.2,0.7,0.2,1);">' +
      inner +
    '</div>';
  document.body.appendChild(overlay);

  if (pickForCtx.stage === 'who') {
    setTimeout(function() {
      var el = document.getElementById('pick-for-new');
      if (el) el.focus();
    }, 80);
  }
}

function pickForWhoSheetHTML() {
  var hostName = (currentDinner && currentDinner.hostName) || '';
  var unfinished = (participants || []).filter(function(p) {
    return p.name !== hostName && !p.has_picked;
  });
  var html =
    '<div style="padding:18px 22px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px;">' +
      '<div>' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';">Step 1 of 2</div>' +
        '<div style="font-size:20px;font-weight:700;letter-spacing:-0.4px;color:'+T.ink+';margin-top:2px;">Who are you picking for?</div>' +
      '</div>' +
      '<button onclick="dismissPickForModal()" class="tab-iconbtn" aria-label="Close">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+T.ink+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button>' +
    '</div>' +
    '<div style="padding:8px 22px 18px;flex:1;overflow-y:auto;">';

  html +=
    '<div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';margin:14px 0 8px;">Already joined</div>';
  if (unfinished.length === 0) {
    html += '<div style="background:'+T.paper+';border-radius:14px;padding:14px 16px;font-size:12.5px;color:'+T.inkSoft+';font-weight:500;line-height:1.4;">Everyone who joined has already picked. Add someone new below.</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:6px;">';
    unfinished.forEach(function(p) {
      html +=
        '<button onclick="pickForChooseExisting(\''+attr(p.name)+'\')" class="tab-item-row" style="background:#fff;border:none;text-align:left;width:100%;">' +
          avatarHTML(p.name, { size: 30 }) +
          '<div style="flex:1;min-width:0;font-size:14.5px;font-weight:600;color:'+T.ink+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(p.name)+'</div>' +
          '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 3l5 5-5 5" stroke="'+T.inkDim+'" stroke-width="2" stroke-linecap="round"/></svg>' +
        '</button>';
    });
    html += '</div>';
  }

  html +=
    '<div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';margin:18px 0 8px;">Or add someone new</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<input type="text" id="pick-for-new" class="tab-input" placeholder="Their name" style="flex:1;" onkeydown="if(event.key===\'Enter\'){pickForAddNew();}" />' +
      '<button onclick="pickForAddNew()" class="tab-grad-btn" style="padding:12px 18px;">Add →</button>' +
    '</div>';

  html += '</div>';
  return html;
}

function pickForItemsSheetHTML() {
  var name = pickForCtx.name || '';
  var selected = (pickForCtx.selectedIndices || []);
  var subtotal = 0;
  selected.forEach(function(i) {
    var m = menuItems[i];
    if (m) subtotal += parseFloat(m.price) || 0;
  });
  var html =
    '<div style="padding:18px 22px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px;">' +
      '<div>' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';">Step 2 of 2</div>' +
        '<div style="font-size:20px;font-weight:700;letter-spacing:-0.4px;color:'+T.ink+';margin-top:2px;">Pick ' + escapeHtml(name) + '’s items</div>' +
      '</div>' +
      '<button onclick="dismissPickForModal()" class="tab-iconbtn" aria-label="Close">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+T.ink+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button>' +
    '</div>' +
    '<div style="padding:8px 16px 18px;flex:1;overflow-y:auto;">';

  if (!menuItems || menuItems.length === 0) {
    html += '<div style="background:'+T.paper+';border-radius:14px;padding:14px 16px;font-size:12.5px;color:'+T.inkSoft+';font-weight:500;line-height:1.4;">No menu items yet — scan a receipt first.</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:8px;">';
    menuItems.forEach(function(item, idx) {
      var claimer = item.claimedBy;
      var isSelected = selected.indexOf(idx) >= 0;
      // Shared items are always available to pick; only skip non-shared items claimed by someone else
      var isOtherClaim = !item.shared && claimer && claimer !== name;
      if (isOtherClaim) return; // skip items claimed by someone else
      var rowClass = 'tab-item-row' + (isSelected ? ' is-mine' : '');
      html +=
        '<div class="'+rowClass+'" onclick="togglePickForClaim('+idx+')">' +
          '<div class="tab-emoji-chip">'+emojiForItem(item.name)+'</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:14.5px;font-weight:600;letter-spacing:-0.2px;color:'+T.ink+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
              escapeHtml(item.name) +
              (item.groupId ? ' <span style="color:'+T.inkDim+';font-weight:500;font-size:12px;">('+((item.groupIndex||0)+1)+'/'+(item.groupSize||1)+')</span>' : '') +
            '</div>' +
            (isSelected ? '<div style="font-size:10.5px;color:'+T.tomato+';font-weight:700;letter-spacing:0.3px;margin-top:3px;">TAPPED</div>' : '') +
          '</div>' +
          '<div style="text-align:right;">'+moneyHTML(item.price)+'</div>' +
        '</div>';

    html += '</div>';

  html += '</div>';

  // Sticky footer with running subtotal + actions
  html +=
    '<div style="padding:12px 22px;border-top:1px solid '+T.rule+';background:#fff;display:flex;flex-direction:column;gap:8px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;">' +
        '<span style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';">Running</span>' +
        moneyHTML(subtotal) +
      '</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="pickForBackToWho()" class="tab-outline-btn" style="flex:0 0 auto;padding:12px 16px;">‹ Back</button>' +
        '<button id="pick-for-save-btn" onclick="pickForSavePicks()" class="tab-grad-btn" style="flex:1;justify-content:center;padding:13px;">Save picks for '+escapeHtml(name.split(/\s+/)[0])+'</button>' +
      '</div>' +
    '</div>';
  return html;
}

function pickForChooseExisting(name) {
  pickForCtx.name = name;
  pickForCtx.stage = 'items';
  pickForCtx.selectedIndices = [];
  (menuItems || []).forEach(function(m, i) {
    if (!m) return;
    if (m.shared ? (m.sharedBy || []).indexOf(name) >= 0 : m.claimedBy === name)
      pickForCtx.selectedIndices.push(i);
  });
  renderPickForModal();
}

async function pickForAddNew() {
  var el = document.getElementById('pick-for-new');
  var name = el ? el.value.trim() : '';
  if (!name) { showToast('Enter their name'); return; }
  try {
    var r = await supabase.rpc('join_dinner', { p_dinner_id: sessionId, p_name: name });
    if (r && r.error) console.warn('[PICK-FOR] join_dinner error:', r.error);
  } catch (e) { console.warn('[PICK-FOR] join_dinner threw:', e); }
  pickForChooseExisting(name);
}

function pickForBackToWho() {
  pickForCtx.stage = 'who';
  pickForCtx.selectedIndices = [];
  renderPickForModal();
}

function togglePickForClaim(idx) {
  if (!pickForCtx.selectedIndices) pickForCtx.selectedIndices = [];
  var pos = pickForCtx.selectedIndices.indexOf(idx);
  if (pos >= 0) pickForCtx.selectedIndices.splice(pos, 1);
  else pickForCtx.selectedIndices.push(idx);
  renderPickForModal();
}

async function pickForSavePicks() {
  var name = pickForCtx.name;
  var indices = (pickForCtx.selectedIndices || []).slice();
  if (!name) { showToast('Pick a person first'); return; }
  if (indices.length === 0) { showToast('Tap at least one item'); return; }
  var items = []; var subtotal = 0;
  indices.forEach(function(i) {
    var m = menuItems[i];
    if (!m) return;
    items.push({ name: m.name, price: parseFloat(m.price) || 0 });
    subtotal += parseFloat(m.price) || 0;
  });
  // Idempotency UX: lock the button while the RPCs run so a slow-network
  // double-tap can't fire the whole chain twice.
  var btn = document.getElementById('pick-for-save-btn');
  var btnLabel = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    console.log('[PICK-FOR] saving for "' + name + '" — ' + items.length + ' items');
    var r1 = await supabase.rpc('upsert_order_with_items', {
      p_dinner_id: sessionId, p_eater_name: name,
      p_subtotal: round2(subtotal), p_is_host: false, p_items: items,
    });
    if (r1 && r1.error) { console.error('[PICK-FOR] upsert failed:', r1.error); throw r1.error; }
    var r2 = await supabase.rpc('claim_menu_items', {
      p_dinner_id: sessionId, p_eater_name: name, p_indices: indices,
    });
    if (r2 && r2.error) { console.error('[PICK-FOR] claim_menu_items failed:', r2.error); throw r2.error; }
    // On-behalf pick → byHost=true so the UI can flag it later
    await markPickedWithLog(name, true, { tag: 'mark_picked PICK-FOR' });
    showToast('Picks saved for ' + name + ' 🤝');
    dismissPickForModal();
    refreshOrders();
  } catch (e) {
    console.error('[PICK-FOR] failed:', e);
    var msg = (e && (e.message || e.hint || e.details)) || 'Try again.';
    showToast("Couldn't save — " + msg);
    if (btn) { btn.disabled = false; btn.textContent = btnLabel || ('Save picks for ' + (name || '').split(/\s+/)[0]); }
  }
}

// ── Pre-settle confirmation overlay ─────────────────────────────────────
// Sanity check before the host moves on. Shows three status rows (items /
// people / math). All ✓ → primary "Show the split" CTA; any ⚠️ → outlined
// "Show the split anyway" so the override is deliberate. The button does
// NOT send totals — it routes to the reckoning sheet where the real
// "Send totals to eaters" lives.
async function openPreSettleOverlay() {
  // Defensive: refresh participants + orders before we render. Any stale
  // module state from earlier in the session would otherwise show phantom
  // "hasn't picked" rows or miss freshly-submitted orders.
  try {
    var both = await Promise.all([
      fetchParticipants(sessionId),
      fetchOrdersForDinner(sessionId),
    ]);
    if (Array.isArray(both[0])) participants = both[0];
    if (Array.isArray(both[1])) orders = both[1];
  } catch (e) {
    console.warn('[PRE-SETTLE] state refresh failed:', e);
  }
  dismissPreSettleOverlay();
  // Compute status
  var itemsTotal = (menuItems || []).length;
  var itemsUnclaimed = (menuItems || []).filter(function(m){
    if (m.shared) return !m.sharedBy || m.sharedBy.length === 0;
    return !m.claimedBy;
  });
  var itemsOk = itemsTotal > 0 && itemsUnclaimed.length === 0;

  var hostName = (currentDinner && currentDinner.hostName) || '';
  var peopleAll = (participants || []);
  var peopleUnfinished = peopleAll.filter(function(p){ return !p.has_picked; });
  var peopleOk = peopleAll.length > 0 && peopleUnfinished.length === 0;

  var sub = (menuItems || []).reduce(function(s,m){ return s + (parseFloat(m.price)||0); }, 0);
  var tax = parseFloat(receiptData.tax) || 0;
  var service = parseFloat(receiptData.serviceFee) || 0;
  var tip = parseFloat(receiptData.tip) || 0;
  var customs = (receiptData.fees || []).reduce(function(s,f){ return s + (parseFloat(f.amount)||0); }, 0);
  var ourSum = sub + tax + service + tip + customs;
  var printed = parseFloat(receiptData.receiptTotal) || 0;
  var mathGap = printed > 0 ? Math.abs(ourSum - printed) : 0;
  var mathOk = printed === 0 || mathGap < 0.10;

  var allOk = itemsOk && peopleOk && mathOk;

  var itemsText = itemsOk
    ? ('All ' + itemsTotal + ' items claimed')
    : (itemsUnclaimed.length + ' of ' + itemsTotal + ' items still unclaimed');
  var itemsExtra = '';
  if (!itemsOk) {
    var listHtml = itemsUnclaimed.slice(0, 6).map(function(it) {
      return '<div style="display:flex;justify-content:space-between;gap:8px;padding:2px 0;">' +
        '<span>'+escapeHtml(it.name)+'</span>' +
        '<span style="color:'+T.inkDim+';font-weight:600;flex-shrink:0;">$'+parseFloat(it.price).toFixed(2)+'</span>' +
      '</div>';
    }).join('');
    var moreLine = itemsUnclaimed.length > 6 ? '<div style="color:'+T.inkDim+';">… and ' + (itemsUnclaimed.length - 6) + ' more</div>' : '';
    itemsExtra =
      '<div style="margin-top:8px;font-size:11.5px;color:'+T.inkSoft+';line-height:1.6;">' + listHtml + moreLine + '</div>' +
      '<button onclick="dismissPreSettleOverlay()" class="tab-ghost-btn" style="margin-top:6px;padding:0;color:'+T.tomato+';font-weight:700;">Cancel & finish claiming →</button>';
  }

  var peopleText = peopleOk
    ? ('All ' + peopleAll.length + ' people picked their items')
    : (peopleUnfinished.length + ' of ' + peopleAll.length + ' still haven’t picked');
  var peopleExtra = '';
  if (!peopleOk && peopleUnfinished.length > 0) {
    peopleExtra =
      '<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
        avatarStackHTML(peopleUnfinished.map(function(p){ return p.name; }), { size: 22, max: 6, ring: '#fff' }) +
        '<span style="font-size:11.5px;color:'+T.inkSoft+';font-weight:500;">' +
          peopleUnfinished.map(function(p){ return escapeHtml(p.name); }).join(', ') +
        '</span>' +
      '</div>' +
      '<button onclick="dismissPreSettleOverlay();openPickForSomeoneElse();" class="tab-ghost-btn" style="margin-top:6px;padding:0;color:'+T.tomato+';font-weight:700;">Pick for them →</button>';
  }

  var mathText = mathOk
    ? ('Math ties — $' + ourSum.toFixed(2))
    : ('Off by $' + mathGap.toFixed(2));
  var mathExtra = mathOk ? '' :
    '<button onclick="dismissPreSettleOverlay();setHostSheet(\'scan\');" class="tab-ghost-btn" style="margin-top:6px;padding:0;color:'+T.tomato+';font-weight:700;">Fix it →</button>';

  // Honest labels: this button routes to the reckoning sheet (where the
  // ACTUAL "Send totals to eaters" lives). It doesn't send anything itself.
  var primaryBtn = allOk
    ? '<button onclick="preSettleProceed()" class="tab-grad-btn" style="width:100%;justify-content:center;padding:14px;">Show the split →</button>'
    : '<button onclick="preSettleProceed()" class="tab-outline-btn" style="width:100%;border-color:'+T.tomato+';color:'+T.tomato+';font-weight:700;padding:14px;">Show the split anyway →</button>';

  var inner =
    '<div role="dialog" aria-modal="true" style="background:#fff;border-radius:24px 24px 18px 18px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -24px 48px -16px rgba(42,22,16,0.45);animation:stageSwap 240ms cubic-bezier(0.2,0.7,0.2,1);">' +
      '<div style="padding:22px 22px 4px;">' +
        '<div style="font-family:'+T.sans+';font-size:24px;font-weight:700;letter-spacing:-0.5px;color:'+T.ink+';">Ready to settle?</div>' +
        '<div style="font-size:13px;color:'+T.inkSoft+';font-weight:500;margin-top:4px;line-height:1.4;">Quick sanity check before we send totals to everyone.</div>' +
      '</div>' +
      '<div style="padding:14px 22px 4px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;">' +
        preSettleStatusRowHTML('Items', itemsOk, itemsText, itemsExtra) +
        preSettleStatusRowHTML('People', peopleOk, peopleText, peopleExtra) +
        preSettleStatusRowHTML('Math', mathOk, mathText, mathExtra) +
      '</div>' +
      '<div style="padding:14px 22px 18px;display:flex;flex-direction:column;gap:8px;border-top:1px solid '+T.rule+';background:#fff;">' +
        primaryBtn +
        '<button onclick="dismissPreSettleOverlay()" class="tab-ghost-btn" style="width:100%;padding:10px;font-weight:600;color:'+T.inkSoft+';">Wait, let me check</button>' +
      '</div>' +
    '</div>';

  var overlay = document.createElement('div');
  overlay.className = 'tab-pre-settle tab-modal-overlay';
  overlay.style.cssText =
    'position:fixed;inset:0;background:rgba(42,22,16,0.55);z-index:200;' +
    'display:flex;align-items:flex-end;justify-content:center;padding:14px;' +
    'animation:tabFadeIn 180ms ease-out;';
  overlay.onclick = function(e) { if (e.target === overlay) dismissPreSettleOverlay(); };
  overlay.innerHTML = inner;
  document.body.appendChild(overlay);
}

function preSettleStatusRowHTML(label, ok, text, extra) {
  var bg = ok ? 'rgba(95,107,58,0.10)' : 'rgba(229,75,60,0.08)';
  var border = ok ? T.olive : T.tomato;
  var iconColor = ok ? T.olive : T.tomato;
  var icon = ok ? '✓' : '⚠️';
  return '<div style="background:'+bg+';border-left:3px solid '+border+';border-radius:12px;padding:12px 14px;">' +
    '<div style="display:flex;align-items:flex-start;gap:10px;">' +
      '<span style="font-size:16px;color:'+iconColor+';line-height:1.1;margin-top:1px;flex-shrink:0;">'+icon+'</span>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:'+T.inkSoft+';">'+escapeHtml(label)+'</div>' +
        '<div style="font-size:14px;font-weight:600;color:'+T.ink+';margin-top:2px;line-height:1.3;">'+escapeHtml(text)+'</div>' +
        (extra || '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function preSettleProceed() {
  dismissPreSettleOverlay();
  // calculateFromClaims handles the unclaimed-items mismatch fork; if it
  // computes cleanly, doCalculate lands on the settle sheet with lastResults
  // already populated. Either way the host's next interaction is the final
  // "Send totals to eaters" press on the settle sheet.
  if (lastResults) {
    setHostSheet('settle');
  } else {
    calculateFromClaims();
  }
}

function dismissPreSettleOverlay() {
  var els = document.querySelectorAll('.tab-pre-settle');
  els.forEach(function(el){ el.remove(); });
}

// ── Visibility resume — self-heal after a phone-sleep mid-flight ────────
// Fires whenever the tab comes back foreground. Two jobs:
//   1. Eater on waiting → poll immediately + re-arm realtime if the channel
//      died while suspended.
//   2. Host on a dinner → refreshOrders to catch missed realtime events;
//      additionally, if totals were already sent, retry any eater whose
//      final_owes is still null (the "host locked phone mid-send" recovery).
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState !== 'visible') return;
  console.log('[VIS] tab visible');
  // Eater path
  if (eaterStage === 'waiting' && eaterCtx && eaterCtx.name) {
    fetchEaterOrder(eaterCtx.name).then(function(order) {
      if (order && order.finalOwes != null) {
        console.log('[VIS] eater resume — finalOwes already set, advancing to settled');
        if (eaterPollTimer) { clearInterval(eaterPollTimer); eaterPollTimer = null; }
        removeChannelSafe(eaterChannel); eaterChannel = null;
        eaterCtx.order = order;
        setEaterStage('settled');
      } else if (eaterStage === 'waiting') {
        // Re-arm realtime + poll in case the websocket died during sleep
        setupEaterRealtime();
      }
    }).catch(function(e) { console.warn('[VIS] eater resume check failed:', e); });
  }
  // Host path
  if (mode === 'host' && sessionId && currentDinner) {
    refreshOrders();
    if (totalsSent && lastResults && lastResults.length) {
      retryMissingFinalOwes();
    }
  }
});

// ── Routing ──────────────────────────────────────────────────────────────
if (mode === 'eater' && sessionId) {
  showEaterView();
} else {
  renderSignInScreen();
  supabase.auth.onAuthStateChange(function(event, session) {
    if (session && session.user) {
      currentUser = session.user;
      if (mode === 'host' && sessionId) showHostDinner();
      else showHostDashboard();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      window.location.href = window.location.pathname;
    }
  });
}

async function refreshDashboard() {
  var data = [];
  try {
    var res = await supabase
      .from('dinners')
      .select('id, restaurant, name, date, order_count, created_at, orders(final_owes)')
      .eq('host_id', currentUser.id)
      .order('created_at', { ascending: false });
    if (res.error) { console.warn('refreshDashboard error:', res.error); }
    else { data = res.data || []; }
  } catch (e) {
    console.warn('refreshDashboard threw:', e);
  }
  dashboardDinners = data;
  // Always render — even on failure, so the user never hangs on Loading…
  try { renderTabHome(dashboardDinners); }
  catch (e) { console.error('renderTabHome threw:', e); }
}

        '<button onclick="dismissDeleteTab()" style="background:transparent;border:none;padding:12px;font-size:14px;font-weight:600;color:'+T.inkSoft+';cursor:pointer;">Cancel</button>' +

function dismissDeleteTab() {
  var els = document.querySelectorAll('.tab-modal-overlay');
  els.forEach(function(el){ el.remove(); });

async function confirmDeleteTab(id) {
  dismissDeleteTab();
  // Optimistic remove + immediate re-render
  var snapshot = dashboardDinners.slice();
  var removedIdx = dashboardDinners.findIndex(function(d){ return d.id === id; });
  if (removedIdx >= 0) {
    dashboardDinners.splice(removedIdx, 1);
    renderTabHome(dashboardDinners);
  }
  var res = await supabase.from('dinners').delete().eq('id', id);
  if (res.error) {
    // Restore on failure
    dashboardDinners = snapshot;
    renderTabHome(dashboardDinners);
    showToast('Delete failed — ' + (res.error.message || 'try again'));
    return;
  }
  // Best-effort: also drop the receipt image from Storage so we don't
  // pile up orphans. Non-fatal — the dinner row is already gone, which
  // is what the user cared about.
  if (currentUser) {
    try {
      await supabase.storage.from('receipts').remove([currentUser.id + '/' + id + '.jpg']);
    } catch (e) {
      console.warn('[RECEIPT DELETE] failed (orphan left in storage):', e);
    }
  }
  clearScanState(id);
  showToast('Tab deleted');
}

// ── HOST DINNER VIEW + sheets (TabClaim) ─────────────────────────────────
async function showHostDinner() {
  await removeChannelSafe(dinnerChannel); dinnerChannel = null;
  stopTicker();
  document.getElementById('app').innerHTML =
    '<div class="tab-app"><div style="padding:80px 24px;text-align:center;color:'+T.inkSoft+';font-size:14px;">Loading…</div></div>';
  var raw = await fetchDinnerRaw(sessionId);
  if (!raw) { showHostDashboard(); return; }
  currentDinner = normalizeDinner(raw);
  window._dinnerHostName = currentDinner.hostName || '';
  receiptData = currentDinner.receiptData;
  menuItems = currentDinner.menuItems || [];
  // Linear flow: send a fresh dinner straight to scan; confirmed → live claim view
  hostSheet = (receiptData && receiptData.confirmed) ? null : 'scan';
  // Host is automatically a participant (idempotent ON CONFLICT DO NOTHING).
  // Without this, the joined/picked counter undercounts and the pre-settle
  // overlay phantom-flags the host as "hasn't picked" even after they claim.
  if (currentDinner.hostName) {
    supabase.rpc('join_dinner', {
      p_dinner_id: sessionId,
      p_name: currentDinner.hostName,
    }).then(function(r) {
      if (r && r.error) console.error('[HOST JOIN] error:', r.error);
      else console.log('[HOST JOIN] ok for "' + currentDinner.hostName + '"');
    }).catch(function(e) { console.error('[HOST JOIN] threw:', e); });
  }
  // Render the current sheet immediately with whatever state we have so the
  // loading placeholder never lingers if realtime/queries are slow.
  try { renderHostSheetForCurrent(); }
  catch (e) { console.error('initial render threw:', e); }
  listenOrders();
  // Best-effort live data top-up; refreshOrders is itself fail-soft now.
  refreshOrders();
}

function listenOrders() {
  removeChannelSafe(dinnerChannel);
  var sidAtSetup = sessionId;
  var channelName = 'dinner-' + sidAtSetup;
  var ch = supabase
    .channel(channelName)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders',       filter: 'dinner_id=eq.' + sidAtSetup }, function() { refreshOrders(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' },                                        function() { refreshOrders(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'participants', filter: 'dinner_id=eq.' + sidAtSetup }, function() { refreshOrders(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'dinners', filter: 'id=eq.' + sidAtSetup }, function(payload) {
      // While the host is actively on the scan sheet, ignore dinner-row
      // UPDATEs. The host's local module state is the source of truth and
      // a rerender mid-typing would steal focus from whatever input they're
      // editing. We re-pick up any external changes the moment they leave
      // the scan sheet (showHostDinner reloads from Supabase on entry).
      if (hostSheet === 'scan') return;
      // Also skip if this UPDATE is plausibly our own autosave echo —
      // helps even on other sheets if we self-write in the future.
      if (Date.now() < (_suppressDinnerEchoUntil || 0)) return;
      if (payload && payload.new) {
        if (payload.new.menu_items)   menuItems   = payload.new.menu_items;
        if (payload.new.receipt_data) receiptData = payload.new.receipt_data;
        if (currentDinner) {
          currentDinner.menuItems = menuItems;
          currentDinner.receiptData = receiptData;
        }
        renderHostSheetForCurrent();
      }
    })
    .subscribe(function(status, err) {
      console.log('[realtime] ' + channelName + ' status:', status, err || '');
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        if (!ch._retried) {
          ch._retried = true;
          setTimeout(function() {
            // Only retry if we're still on the same dinner; otherwise some other
            // navigation already swapped the channel and we'd duplicate it.
            if (sessionId === sidAtSetup && currentDinner) {
              console.log('[realtime] retrying ' + channelName);
              listenOrders();
            }
          }, 1500);
        }
      }
    });
  dinnerChannel = ch;
}

async function refreshOrders() {
  try {
    var both = await Promise.all([
      fetchOrdersForDinner(sessionId),
      fetchParticipants(sessionId),
    ]);
    orders = both[0] || [];
    participants = both[1] || [];
  } catch (e) {
    console.warn('refreshOrders rejected:', e);
    orders = orders || [];
    participants = participants || [];
  }
  // Render even on partial failure so the host never hangs on Loading…
  try { renderHostSheetForCurrent(); }
  catch (e) { console.error('renderHostSheetForCurrent threw:', e); }
}

function renderHostSheetForCurrent() {
  if (hostSheet === null)           return renderHostClaim();
  if (hostSheet === 'scan')         return renderHostScanSheet();
  if (hostSheet === 'share')        return renderHostShareScreen();
  // 'add-eaters' is gone — replaced by openPickForSomeoneElse modal
  if (hostSheet === 'settle')       return renderHostSettleSheet();
  if (hostSheet === 'mismatch')     return renderHostMismatchScreen();
  if (hostSheet === 'paid')         return renderHostPaidSheet();
  if (hostSheet === 'edit-order')   return renderHostEditOrderSheet();
}

function setHostSheet(name, ctx) {
  hostSheet = name;
  editingOrderCtx = (name === 'edit-order' ? ctx : null);
  renderHostSheetForCurrent();
}

function renderHostClaim() {

  var confirmed = !!(receiptData && receiptData.confirmed);
  var hostName = d.hostName || '';
  var claimedCount = (menuItems || []).filter(function(i){ return !!i.claimedBy; }).length;
  var claimedPct = menuExists ? Math.round((claimedCount/menuItems.length)*100) : 0;
  var feesTotal = (receiptData.fees || []).reduce(function(s,f){ return s+(f.amount||0); }, 0);
  var grandTotal = confirmed
    ? ((receiptData.subtotal||0) + (receiptData.tax||0) + (receiptData.tip||0) + feesTotal)
    : 0;

  var hasReceiptImage = !!(receiptData && (receiptData._previewImage || receiptData.image_url));
  var receiptBtn = hasReceiptImage
    ? '<button class="tab-iconbtn" onclick="openReceiptViewer()" aria-label="View receipt" title="View receipt" style="font-size:20px;">🧾</button>'
    : '';
  var shareBtn =
    '<button class="tab-iconbtn" onclick="sharePopupInPlace()" aria-label="Share tab" title="Share tab">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="'+T.ink+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
    '</button>';

    ? '<div style="display:flex;gap:8px;">'+receiptBtn+shareBtn+'</div>'
    : shareBtn;

  var headerHTML = hostHeaderHTML({
    title: d.restaurant,
    sub: escapeHtml(v.tag) + ' · ' + escapeHtml(formatDate(d.date)),
    right: rightHeader,
  });

  var tickerSection = '<div style="padding:0 16px 14px;">' + tickerHTML() + '</div>';

  var progressSection = '';
  if (menuExists || orders.length > 0) {
    // Claimed total: when we have a menu, count each item's full price exactly
    // once if it's claimed. Shared items are claimed when ≥1 person shares them;
    // their full price counts once (not once per sharer), matching how the
    // per-person fractional shares sum back to the full price. Fall back to
    // summing order subtotals only when there's no menu (manual-entry path).
    var claimedDollars;
    if (menuExists) {
      claimedDollars = menuItems.reduce(function(s, m) {

          ? ((m.sharedBy || []).length > 0)

          '<span>$'+claimedDollars.toFixed(2)+' OF $'+subtotal.toFixed(2)+' CLAIMED</span>' +

          '<div style="width:'+dollarPct+'%;height:100%;border-radius:999px;background:'+BTN_GRAD+';transition:width 0.4s ease;"></div>' +

    bodyHTML +=
      '<div style="padding:0 22px 160px;display:flex;flex-direction:column;gap:14px;">' +
        '<div class="tab-card" style="padding:28px 22px;text-align:center;">' +
          '<div style="font-size:38px;margin-bottom:8px;">📷</div>' +
          '<div style="font-size:19px;font-weight:700;color:'+T.ink+';letter-spacing:-0.3px;">Scan the receipt</div>' +
          '<div style="font-size:13px;color:'+T.inkSoft+';font-weight:500;margin-top:6px;max-width:280px;margin-inline:auto;line-height:1.4;">Snap a photo and we’ll read items, totals, tax — the lot.</div>' +
          '<button class="tab-grad-btn" style="margin-top:18px;" onclick="setHostSheet(\'scan\')">Open scanner →</button>' +
        '</div>' +
      '</div>';
  }

  var stickyHTML = '';
  if (confirmed && (ordersExist || claimedCount > 0)) {
    stickyHTML =
      '<div class="tab-sticky-bar">' +

        '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;">' +
          '<div>' +

async function toggleHostItemClaim(idx) {
  var hostName = window._dinnerHostName;
  if (!hostName) { showToast('Set your name on this tab first'); return; }
  var item = menuItems[idx];
  if (!item) return;
  // Optimistic local toggle
  if (item.shared) {
    // Shared items: add/remove the host from the sharedBy claimant list.
    var sb = (item.sharedBy || []).slice();
    var sbPos = sb.indexOf(hostName);
    if (sbPos >= 0) sb.splice(sbPos, 1);
    else sb.push(hostName);
    menuItems[idx] = Object.assign({}, item, { sharedBy: sb });
  } else {
    if (item.claimedBy && item.claimedBy !== hostName) return;
    var nextClaim = item.claimedBy === hostName ? null : hostName;
    menuItems[idx] = Object.assign({}, item, { claimedBy: nextClaim });
  }
  renderHostClaim();
  // Recompute host's full claim list across both shared and non-shared items.
  // Shared items contribute the host's even split (price ÷ number of sharers).
  var indices = [];
  var items = [];
  var subtotal = 0;
  menuItems.forEach(function(m, i) {
    var hostHasIt = m.shared
      ? (m.sharedBy || []).indexOf(hostName) >= 0
      : (m.claimedBy === hostName);
    if (!hostHasIt) return;
    indices.push(i);
    var price = parseFloat(m.price) || 0;
    var sharePrice = m.shared ? price / Math.max(1, (m.sharedBy || []).length) : price;
    items.push({ name: m.name, price: round2(sharePrice) });
    subtotal += sharePrice;
  });
  try {
    var r1 = await supabase.rpc('claim_menu_items', {
      p_dinner_id: sessionId, p_eater_name: hostName, p_indices: indices,
    });
    if (r1.error) throw r1.error;
    if (items.length > 0) {
      var r2 = await supabase.rpc('upsert_order_with_items', {
        p_dinner_id: sessionId, p_eater_name: hostName,
        p_subtotal: round2(subtotal), p_is_host: true, p_items: items,
      });
      if (r2.error) throw r2.error;
      // Host picked their own items (NOT picked_by_host — that flag is
      // reserved for the pick-for-someone-else flow).
      markPickedWithLog(hostName, false, { tag: 'mark_picked HOST' });
    } else {
      await supabase.from('orders').delete().eq('dinner_id', sessionId).eq('eater_name', hostName);
    }
  } catch (e) {
    showToast('Sync hiccup — refreshing');
  }
}

// Tiny base64-dataURL → Blob converter for the Storage upload path.
// We need a Blob (not a dataURL) so supabase.storage.upload sends real
// binary with the right Content-Type rather than a fat string body.
function dataURLtoBlob(dataUrl) {
  var arr = dataUrl.split(',');
  var mime = (arr[0].match(/:(.*?);/) || [])[1] || 'image/jpeg';
  var bstr = atob(arr[1]);
  var n = bstr.length;
  var u8 = new Uint8Array(n);
  while (n--) u8[n] = bstr.charCodeAt(n);
  return new Blob([u8], { type: mime });
}

// Strip every "_"-prefixed key so client-only fields (preview image,
// last filename, etc.) never end up in Supabase receipt_data jsonb.
// image_url is NOT underscore-prefixed and DOES persist — that's the
// whole point of the Storage migration.
function stripReceiptInternal(rd) {
  var clean = {};
  Object.keys(rd || {}).forEach(function(k) {
    if (k && k[0] !== '_') clean[k] = rd[k];
  });
  return clean;
}

// ── sessionStorage persistence for in-progress scan/review state ────────
// Lets the host switch tabs / apps mid-edit and come back without losing
// hand-typed prices, fees, or tax tweaks. SessionStorage (not localStorage)
// keeps it scoped to this tab and disappears when the browser session ends.
// Keyed per dinner_id so two dinners open in two tabs don't collide.
var scanStateRestored = false;
var _saveScanStateTimer = null;
function saveScanState() {
  if (!sessionId) return;
  if (receiptData && receiptData.confirmed) return; // already in Supabase
  try {
    var state = {
      menuItems: menuItems || [],
      receiptData: stripReceiptInternal(receiptData || {}),
      scanTimestamp: Date.now(),
    };
    sessionStorage.setItem('zubill-scan-state-' + sessionId, JSON.stringify(state));
  } catch (e) {
    console.warn('saveScanState failed (sessionStorage full?):', e);
  }
}
function saveScanStateDebounced() {
  if (_saveScanStateTimer) clearTimeout(_saveScanStateTimer);
  _saveScanStateTimer = setTimeout(saveScanState, 400);
  // Lockstep durable backing — sessionStorage is the instant local cache,
  // Supabase is the cross-device / cross-refresh source of truth.
  autosaveScanDebounced();
}

// ── Durable autosave: write in-progress scan state to Supabase ───────────
// sessionStorage dies on tab discard, never crosses devices, and is gone
// after a hard refresh in incognito. This is the durable backing for that
// fast local cache. Same 400ms trailing debounce so a burst of edits
// collapses to one PATCH /dinners?id=eq.<sid>.
var _autosaveScanTimer = null;
function autosaveScanToSupabase() {
  // Re-check at fire time, not just at schedule time — handles the race
  // where confirmReceiptTotals lands between schedule and fire.
  if (!sessionId || !currentDinner) return;
  if (receiptData && receiptData.confirmed) return;
  var payload = {
    menu_items: menuItems || [],
    receipt_data: stripReceiptInternal(receiptData || {}),
  };
  // Mark a short window where we treat dinner-row realtime UPDATEs as
  // self-echoes — see listenOrders.
  _suppressDinnerEchoUntil = Date.now() + 2000;
  supabase.from('dinners').update(payload).eq('id', sessionId).then(function(res) {
    if (res && res.error) console.error('[autosaveScan] failed:', res.error);
  }, function(e) {
    console.error('[autosaveScan] threw:', e);
  });
}
function autosaveScanDebounced() {
  if (_autosaveScanTimer) clearTimeout(_autosaveScanTimer);
  _autosaveScanTimer = setTimeout(autosaveScanToSupabase, 400);
}
var _suppressDinnerEchoUntil = 0;

function loadScanState() {
  if (!sessionId) return null;
  try {
    var raw = sessionStorage.getItem('zubill-scan-state-' + sessionId);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function clearScanState(id) {
  var key = 'zubill-scan-state-' + (id || sessionId);
  try { sessionStorage.removeItem(key); } catch (e) {}
}

function tipPillRowHTML() {

// Parse grouped items into N individual claimable rows. Handles several patterns:
//   "5 Peri Chicken (34.00)"     @ $170   → 5 × "Peri Chicken"  @ $34
//   "Caesar Salad x2"            @ $30    → 2 × "Caesar Salad"  @ $15
//   "2x Espresso"                @ $8     → 2 × "Espresso"      @ $4
//   "Pie (3)"                    @ $24    → 3 × "Pie"           @ $8
//   "Cake @ 2"                   @ $14    → 2 × "Cake"          @ $7
//   "Bread qty 4"                @ $12    → 4 × "Bread"         @ $3
//   "Diet Coke 4.75"             @ $4.75  → 1 ungrouped (4.75 is a PRICE, not qty)
//   "Soup"                       @ $7     → 1 ungrouped
// Rules: qty must be a small integer 2 ≤ n ≤ 20. A trailing paren is a per-unit
// price hint if it has decimals or > 20; a small int without decimals is a qty.
// Per-unit math: if total/qty rounds cleanly (within $0.05 of an honest two-decimal
// figure), use it; otherwise distribute evenly with the residual going to the first
// row so all N row prices sum exactly to the input price.
function expandGroupedItem(item) {
  var rawName = String((item && item.name) || '').trim();
  var price = parseFloat(item && item.price) || 0;
  var qty = 0;
  var cleanName = rawName;
  var parenPerUnit = null;

  // a) leading "N " (integer + space) — "5 Peri Chicken"
  var m = rawName.match(/^(\d+)\s+(.+)$/);
  if (m) {
    var n = parseInt(m[1], 10);
    if (n > 1 && n <= 20) { qty = n; cleanName = m[2].trim(); }
  }
  // b) leading "NxItem" / "NX Item" — "2x Espresso", "3X Latte"
  if (qty === 0) {
    m = rawName.match(/^(\d+)\s*[xX]\s+(.+)$/);
    if (m) {
      var n2 = parseInt(m[1], 10);
      if (n2 > 1 && n2 <= 20) { qty = n2; cleanName = m[2].trim(); }
    }
  }
  // c) trailing "xN" variants — permissive: optional space before/after x,
  //    Unicode × (U+00D7), and optional surrounding parens.
  //    Covers "Coke x2", "Cokex2", "Coke x 2", "Coke(x2)", "Coke ×2",
  //    "Caesar Salad x2".
  if (qty === 0) {
    m = rawName.match(/^(.+?)\s*\(?\s*[xX×]\s*(\d{1,2})\s*\)?\s*$/);
    if (m) {
      var n3 = parseInt(m[2], 10);
      if (n3 > 1 && n3 <= 20) { qty = n3; cleanName = m[1].trim(); }
    }
  }
  // d) trailing " @ N" / " qty N" — "Cake @ 2", "Bread qty 4"
  if (qty === 0) {
    m = rawName.match(/^(.+?)\s+(?:@\s*|qty\s+)(\d+)\s*$/i);
    if (m) {
      var n4 = parseInt(m[2], 10);
      if (n4 > 1 && n4 <= 20) { qty = n4; cleanName = m[1].trim(); }
    }
  }
  // e) trailing bare integer — "Coke 2". Gated to bodies that are purely
  //    letters/spaces/&'.- so "Diet Coke 4.75" (decimal price) and
  //    "Pizza Margherita 24.50" do NOT trigger. The (\d{1,2}) end-anchor
  //    means anything with a decimal-style suffix is rejected.
  if (qty === 0) {
    m = rawName.match(/^([A-Za-z][A-Za-z\s&'.\-]+)\s+(\d{1,2})\s*$/);
    if (m) {
      var n5 = parseInt(m[2], 10);
      if (n5 > 1 && n5 <= 20) { qty = n5; cleanName = m[1].trim(); }
    }
  }

  // Trailing paren: could be qty "(2)" or per-unit hint "(34.00)".
  // Decimals OR value > 20 → per-unit price. Small int 2..20 → quantity (only
  // if we haven't already detected a qty elsewhere).
  m = cleanName.match(/^(.+?)\s*\(([\d.]+)\)\s*$/);
  if (m) {
    var inner = m[2];
    var parenN = parseFloat(inner);
    if (!isNaN(parenN)) {
      var hasDecimals = inner.indexOf('.') >= 0;
      if (!hasDecimals && parenN > 1 && parenN <= 20 && qty === 0) {
        qty = Math.floor(parenN);
        cleanName = m[1].trim();
      } else if (hasDecimals || parenN > 20) {
        parenPerUnit = parenN;
        cleanName = m[1].trim();
      }
    }
  }

  if (qty < 2) {
    return [{ name: cleanName, price: price, claimedBy: null }];
  }

  // Per-unit price: use the paren hint only if it lines up with total ±$0.05.
  var perUnitRaw;
  if (parenPerUnit != null && Math.abs(parenPerUnit * qty - price) < 0.05) {
    perUnitRaw = parenPerUnit;
  } else {
    perUnitRaw = price / qty;
  }
  var perUnit = Math.round(perUnitRaw * 100) / 100;
  var residual = Math.round((price - perUnit * qty) * 100) / 100;

  var gid = 'g-' + cleanName.replace(/\s+/g, '-').toLowerCase().replace(/[^a-z0-9-]/g, '') + '-' + perUnit.toFixed(2);
  var out = [];
  for (var i = 0; i < qty; i++) {
    var rowPrice = perUnit;
    if (i === 0 && Math.abs(residual) >= 0.01) {
      rowPrice = Math.round((perUnit + residual) * 100) / 100;
    }
    out.push({
      name: cleanName,
      price: rowPrice,
      claimedBy: null,
      groupId: gid,
      groupSize: qty,
      groupIndex: i,
    });
  }
  return out;
}

// Apply both name-leading-integer expansion and any legacy item.qty>1 fan-out.
function processScannedItem(item) {
  var fromName = expandGroupedItem(item);
  if (fromName.length > 1) return fromName;
  var qty = (item && item.qty) || 1;
  if (qty > 1) {
    var perUnit = parseFloat(item.price) || 0;
    var cleanName = String(item.name || '').trim();
    var gid = 'g-' + cleanName.replace(/\s+/g, '-').toLowerCase().replace(/[^a-z0-9-]/g, '') + '-' + perUnit.toFixed(2);
    var grouped = [];
    for (var i = 0; i < qty; i++) {
      grouped.push({
        name: cleanName, price: round2(perUnit), claimedBy: null,
        groupId: gid, groupSize: qty, groupIndex: i,
      });
    }
    return grouped;
  }
  return [{ name: String((item && item.name) || '').trim(), price: parseFloat(item && item.price) || 0, claimedBy: null }];
}

// Build a render-time list of either single-item slots or group buckets
// keyed by groupId, with the original menuItems indices preserved.
function groupMenuItemsByGroupId(items) {
  var slots = [];
  var byId = {};
  (items || []).forEach(function(item, idx) {
    if (item && item.groupId) {
      if (!byId[item.groupId]) {
        var g = {
          isGroup: true, groupId: item.groupId,
          name: item.name, perUnit: parseFloat(item.price) || 0,
          items: [], indices: [],
        };
        byId[item.groupId] = g;
        slots.push(g);
      }
      byId[item.groupId].items.push(item);
      byId[item.groupId].indices.push(idx);
    } else {
      slots.push({ isGroup: false, item: item, index: idx });
    }
  });
  return slots;
}
